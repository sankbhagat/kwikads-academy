// Helper: decode Google JWT token
function decodeJwt(token) {
  const base64Url = token.split('.')[1];
  const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  const jsonPayload = decodeURIComponent(atob(base64).split('').map(c =>
    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
  ).join(''));
  return JSON.parse(jsonPayload);
}

    { type: 'ai_message', text: "Signal-to-campaign mapping — memorise this. On calls you'll diagnose the brand's pain, then prescribe the right signal:", delay: 400 },
    { type: 'ai_message', text: "CAC too high → new_customer_purchase (cleaner acquisition seeds). Low prepaid / high RTO → purchase_prepaid (margin-positive audiences). AOV declining → multi_product_purchase (buyers who naturally bundle). Churn / low repeat rate → high_order_volume (retention-prone buyers).", delay: 400 },
    { type: 'quiz', question: "A beauty brand has 60% COD orders and 18% RTO. Which signal do you prescribe?", options: [
      "new_customer_purchase — they need new customers",
      "purchase_prepaid — seed Meta with prepaid buyers to shift the mix from COD to prepaid",
      "multi_product_purchase — push AOV up",
      "high_order_volume — get repeat buyers"
    ], correct: 1, explanation: "60% COD + 18% RTO = margin bleed. The root cause is Meta's pixel can't distinguish payment intent. purchase_prepaid seeds lookalikes from verified prepaid buyers across the GoKwik network → shifts the payment mix → RTO drops → margin recovers.", hint: "High COD + high RTO = margin problem. Which signal fixes payment-intent blindness?" },
    { type: 'practice', prompt: "Explain to a non-technical CMO why KwikAds' EMQ score of 8-10 matters more than their agency's CAPI setup. Keep it jargon-light, 3 sentences max.", keywords: ["emq", "signal", "checkout", "pixel", "match", "quality", "verified", "first-party", "meta", "algorithm"], minKeywords: 3, goodFeedback: "Clean explanation. You translated technical advantage into business outcome without drowning in jargon. Use this framing on calls.", improveFeedback: "Try: 'Meta's algorithm is only as smart as the data feeding it. Your agency sends it pixel data — cookie-degraded and noisy. We send verified checkout data from 200M+ shoppers — Meta sees cleaner signals, finds better buyers, your CPA drops.' Keep it cause → effect.", hint: "Don't explain EMQ as a score. Explain it as: better data in → better audiences out → lower cost per customer." },
    { type: 'summary_card', points: [
      "EMQ (0-10) = Meta's signal quality score. Agency: 4-6 (pixel). KwikAds: 8-10 (checkout).",
      "CAPI = transport. Source of truth = moat. Never let prospects collapse the distinction.",
      "4 primary signals: purchase_prepaid (margin), new_customer_purchase (acquisition), multi_product_purchase (AOV), high_order_volume (retention).",
      "200+ total signals from 15,000+ brand network. Cross-brand intelligence is the unfair advantage."

  module5: [
    { type: 'ai_message', text: "Module 5 — ICP, Tiers & Commercial Math. You'll lose deals if you can't do this arithmetic live on a call. Let's make it reflexive.", delay: 500 },
    { type: 'ai_message', text: "ICP definition — know it cold. Our ideal customer: D2C brand spending ₹25L+/month on Meta/performance ads, with Shopify or equivalent storefront, and a willingness to share Meta ad account access for audit.", delay: 400 },
    { type: 'stat_card', stats: [
      { value: "₹25L+", label: "Monthly Meta spend", subtext: "ICP floor — below this, unit economics break" },
      { value: "₹40K", label: "Minimum monthly fee", subtext: "Viability threshold" },
      { value: "4 Tiers", label: "Service levels", subtext: "Matched to ad spend scale" }
    ] },
    { type: 'ai_message', text: "Tier 1 — Long Tail: ₹0-10L/month spend. Self-serve or light-touch. Low fee ceiling. Don't chase these unless they're scaling fast (use Peesafe as the archetype — entered small, scaled 6x).", delay: 400 },
    { type: 'ai_message', text: "Tier 2 — Emerging: ₹10-25L/month. Growth-stage brands. Core of the SMB pipeline. Standard onboarding, shared AM. The bread-and-butter tier.", delay: 400 },
    { type: 'ai_message', text: "Tier 3 — SMB: ₹25-50L/month. Full service. Dedicated account manager. Custom signal configuration. This is where most of your quota lives.", delay: 400 },
    { type: 'ai_message', text: "Tier 4 — Enterprise: ₹50L+/month. White-glove. Dedicated AM + CSM. Custom reporting, quarterly business reviews, multi-brand architecture if needed. Longer sales cycle but higher ACV.", delay: 400 },
    { type: 'ai_message', text: "The viability rule: minimum ₹40K/month fee. Below that, our implementation cost (signal setup, CAPI config, audience building, ongoing optimisation) doesn't pay back. If a prospect can't clear ₹40K, parking-lot them for nurture.", delay: 400 },
    { type: 'quiz', question: "A brand spends ₹12L/month on Meta. They want to onboard. Your call:", options: [
      "Onboard in Emerging tier — ₹12L qualifies",
      "Reject — below ₹25L ICP floor. Parking-lot for nurture, revisit in 2 quarters",
      "Offer Long Tail tier at discounted rate",
      "Escalate to Founder for approval"
    ], correct: 1, explanation: "₹12L is below our ₹25L ICP floor. The unit economics don't work — min ₹40K fee on ₹12L spend makes the ROAS math unattractive for the brand too. Park them. Check back as they scale.", hint: "Know the ICP floor. It protects your quota from low-fit accounts that churn." },
    { type: 'ai_message', text: "Live deal math — do this on every commercial call. Example: Brand spends ₹40L/month. Current ROAS 2.5x. Revenue = ₹1Cr/month.", delay: 400 },
    { type: 'ai_message', text: "If KwikAds lifts ROAS 25% → new ROAS 3.1x → revenue ₹1.25Cr. Delta = ₹25L incremental revenue. Our fee ₹1.5L/month. Payback: month 1. That's the slide you build for every prospect.", delay: 400 },
    { type: 'quiz', question: "A prospect spends ₹30L/month, ROAS 2x (revenue ₹60L). You promise 20% ROAS lift. What's the incremental monthly revenue?", options: [
      "₹6L",
      "₹12L",
      "₹15L",
      "₹30L"
    ], correct: 1, explanation: "Current revenue = ₹60L. 20% ROAS lift → new ROAS 2.4x → revenue ₹72L. Delta = ₹12L/month incremental. If our fee is ₹1-2L, payback is immediate. Always do this math live.", hint: "Revenue = spend × ROAS. Calculate before and after the lift. The delta is the incremental value." },
    { type: 'practice', prompt: "A bootstrapped founder spending ₹45L/month says: 'Your ₹1.5L/month fee is expensive.' Do the payback math for them in 3 sentences.", keywords: ["roas", "revenue", "incremental", "payback", "month", "fee", "lift", "25%", "invest"], minKeywords: 3, goodFeedback: "Clean math. You flipped cost into investment with a concrete payback timeline. Founders buy ROI, not features. Use this on every pricing objection.", improveFeedback: "Try: 'You spend ₹45L at 2.5x ROAS = ₹1.12Cr revenue. A 25% lift = ₹1.4Cr. That's ₹28L more revenue. Our fee is ₹1.5L. You're 18x positive in month 1.' Always end with the multiple.", hint: "Never defend price. Show the math. Incremental revenue ÷ fee = payback multiple." },
    { type: 'summary_card', points: [
      "ICP: ₹25L+/month Meta spend. Below that, park for nurture.",
      "4 tiers: Long Tail (₹0-10L), Emerging (₹10-25L), SMB (₹25-50L), Enterprise (₹50L+).",
      "Viability floor: ₹40K/month minimum fee.",
      "Always do live payback math: incremental revenue ÷ fee = payback multiple. If it's 5x+ in month 1, the deal closes."
    ] },
    { type: 'ai_message', text: "Module 5 done. +150 XP. Next: consultative selling — Discovery to Diagnosis.", delay: 500, xp: 150 }
  ],

  module6: [
    { type: 'ai_message', text: "Module 6 — Consultative Selling: Discovery → Diagnosis → Prescription. You sell like a strategist, not a vendor. This module rewires your call structure.", delay: 500 },
    { type: 'ai_message', text: "Rule 1: The first 10 minutes of any call belong to the prospect, not you. If you're talking more than 30% of the first 10 minutes, you're pitching, not discovering.", delay: 400 },
    { type: 'ai_message', text: "Phase 1 — Discovery. Goal: understand their world before you show yours. Open with a future-focused question, not a product pitch.", delay: 400 },
    { type: 'ai_message', text: "The 5 Discovery Questions for KwikAds (in order): 1. 'What does the next 90 days of growth look like for you?' 2. 'What's your current Meta spend and ROAS?' 3. 'How are you building audiences today — pixel, CRM uploads, broad?' 4. 'What's your prepaid vs COD split?' 5. 'If I could fix one metric this quarter, which would move the needle most?'", delay: 400 },
    { type: 'ai_message', text: "Listen for the 6 pain signals from Module 3: rising CAC, low prepaid, audience fatigue, declining AOV, attribution blindness, budget leakage. When you hear one, you've found the wedge.", delay: 400 },
    { type: 'quiz', question: "Best opening line on a discovery call with a D2C CMO:", options: [
      "Let me tell you about KwikAds and our Meta Signals Partnership",
      "What does the next 90 days of growth look like for you?",
      "What's your current ROAS?",
      "We've helped brands improve ROAS by 25%"
    ], correct: 1, explanation: "Future-focused, open-ended, business-framed. Gets them talking about THEIR priorities. Credentials and stats come AFTER pain is named. Never lead with your deck.", hint: "The best opener makes the CMO talk for the next 5 minutes, not you." },
    { type: 'ai_message', text: "Phase 2 — Diagnosis. Reflect what you heard, then sharpen it. The goal is to make them feel the gap between where they are and where they could be.", delay: 400 },
    { type: 'ai_message', text: "Diagnosis framework: 'So if I'm hearing you right, you're at [current state], but [pain]. The gap between here and [desired state] is [root cause]. Is that fair?' — Wait for the nod. That nod is permission to prescribe.", delay: 400 },
    { type: 'ai_message', text: "Example: 'So you're at 2.5x ROAS, but CAC has climbed 30% and your agency says it's just market inflation. The gap is signal quality — your pixel data degraded post-iOS14 and Meta's optimising on noisy events. Is that fair?'", delay: 400 },
    { type: 'ai_message', text: "Phase 3 — Prescription. Now and only now do you bring KwikAds in. Map to the specific pillar that addresses their diagnosed pain. End with the audit offer.", delay: 400 },
    { type: 'ai_message', text: "Prescription formula: 'Here's what we'd do: [Pillar] addresses [their pain]. Specifically, [signal/feature]. We've seen [case study] achieve [result] with the same starting point. I'd like to audit your account in 3 days and show you exactly what's possible. No commitment — just data.'", delay: 400 },
    { type: 'quiz', question: "When do you mention KwikAds pricing on a discovery call?", options: [
      "In the opening — get budget alignment early",
      "Never on the first call — pricing comes after the audit presentation",
      "When the prospect asks about cost",
      "Right after explaining the three pillars"
    ], correct: 1, explanation: "Pricing on a discovery call kills momentum. The audit IS the next step, not a price quote. After the audit presentation, the value is proven and pricing anchors to demonstrated uplift, not a brochure.", hint: "If you quote price before they've seen their own data, you're negotiating blind." },
    { type: 'practice', prompt: "A CMO tells you: 'Our ROAS is 2.8x but our repeat purchase rate is only 12% and we spend ₹35L/month.' Walk through Discovery → Diagnosis → Prescription in 4 sentences.", keywords: ["discovery", "diagnosis", "prescription", "repeat", "retention", "pillar", "signal", "audit", "high_order_volume", "visibility", "ltv", "cohort"], minKeywords: 4, goodFeedback: "Textbook execution. You listened, diagnosed the retention gap, prescribed the right pillar and signal, and closed with the audit. This is the call structure that converts.", improveFeedback: "Structure: Discovery (acknowledge 2.8x ROAS, probe 12% repeat) → Diagnosis ('your Meta campaigns optimise for first purchase, not repeat — that's why LTV is low') → Prescription ('Pillar 3 visibility + high_order_volume signal → let me audit and show you the retention cohort you're missing'). Always end with the audit.", hint: "12% repeat = retention problem. Which pillar + signal addresses LTV blindness?" },
    { type: 'summary_card', points: [
      "3 phases: Discovery (listen) → Diagnosis (reflect + sharpen) → Prescription (pillar + audit).",
      "5 discovery questions — memorise the sequence. Future-focused opener, then metrics, then pain.",
      "Never pitch before diagnosing. Never price before auditing. The audit is the sale."
    ] },
    { type: 'ai_message', text: "Module 6 done. +150 XP. Next: the 6-stage client journey from Discovery to Go-Live.", delay: 500, xp: 150 }
  ],

  module7: [
    { type: 'ai_message', text: "Module 7 — The 6-Stage Client Journey. From first touch to go-live. Every deal follows this path. Your job: never let a deal stall between stages.", delay: 500 },
    { type: 'ai_message', text: "Stage 1 — Discovery Call (30 min). Goal: diagnose the pain, build trust, earn the right to audit. Use the 5 Discovery Questions from Module 6. Output: a clear pain statement and verbal agreement to proceed to audit.", delay: 400 },
    { type: 'ai_message', text: "Stage 2 — Audit Request (1-2 days). You ask for read-only access to their Meta Ad Manager. Position it as: 'No commitment — I'll show you what your data says in 3 days.' The lighter the ask, the faster the yes.", delay: 400 },
    { type: 'ai_message', text: "Stage 3 — Audit Presentation (1 call, 30-45 min). This is where you show them their own data problem. Structure: Current state → What we found → Opportunity gap → What KwikAds would do differently. End with: 'Want to see this in action?'", delay: 400 },
    { type: 'ai_message', text: "The audit IS the sale. If your audit is weak, no amount of pitching saves the deal. The audit must show: EMQ gap (their score vs. what's possible), audience overlap/fatigue, signal gaps (what events Meta isn't seeing), and estimated uplift range.", delay: 400 },
    { type: 'ai_message', text: "Stage 4 — Commercial (1-2 calls). Pricing, scope, SLA. Always anchor price to the audit's demonstrated uplift: 'The audit showed ₹X incremental revenue. Our fee is ₹Y. Payback is month 1.' Never send pricing without a review call booked.", delay: 400 },
    { type: 'ai_message', text: "Stage 5 — Closure (1-5 days). Legal review, MSA, sign-off. Stalls here = you didn't build enough urgency in Stage 3. If a deal stalls at closure, go back to the audit data and add a time-decay frame: 'Every month without these signals is ₹X left on the table.'", delay: 400 },
    { type: 'ai_message', text: "Stage 6 — Go-Live (7-14 days). CAPI integration, signal configuration, audience building, first campaign launch. The AM owns this, but you stay in the loop for the first 30 days to protect the relationship.", delay: 400 },
    { type: 'stat_card', stats: [
      { value: "2-3 weeks", label: "Typical full cycle", subtext: "Discovery to Go-Live" },
      { value: "3 days", label: "Audit turnaround", subtext: "Analysis of their Meta account" },
      { value: "7-14 days", label: "Go-Live implementation", subtext: "CAPI + signals + first campaign" }
    ] },
    { type: 'quiz', question: "A deal has been stuck at 'closure' for 10 days. The CMO says 'legal is reviewing.' What do you do?", options: [
      "Wait patiently — legal takes time",
      "Call legal directly and push",
      "Go back to the CMO with the audit data: 'Every week without these signals costs you ~₹X in missed ROAS uplift. Can we get legal on a 10-min call to unblock?'",
      "Offer a discount to speed things up"
    ], correct: 2, explanation: "Deals die in legal limbo. Your job is to create urgency without being pushy. Use the audit data to quantify the cost of delay. Offer to join a short call with legal to answer technical/data questions. Never discount to unstick a deal.", hint: "If a deal stalls at closure, the problem is usually urgency, not legal. Quantify the cost of waiting." },
    { type: 'practice', prompt: "Write a 3-line email to a CMO requesting read-only access to their Meta Ad Manager for the audit. Keep it low-friction.", keywords: ["read-only", "access", "audit", "3 days", "meta", "ad manager", "no commitment", "findings", "data"], minKeywords: 3, goodFeedback: "Clean, low-friction, and sets clear expectations. This email gets replies because it asks for little and promises insight.", improveFeedback: "Key elements: 1) Reference the pain from discovery ('Following up on the CAC discussion'), 2) Specific ask ('read-only access to Meta Ad Manager'), 3) Timeline ('3 business days'), 4) Low commitment ('No obligation — just data'). Remove anything that sounds like a pitch.", hint: "The best audit request email is under 5 sentences. Reference the call, make the ask, set the timeline." },
    { type: 'summary_card', points: [
      "6 stages: Discovery → Audit Request → Audit Presentation → Commercial → Closure → Go-Live.",
      "The audit IS the sale. Invest maximum effort here.",
      "Never send pricing without a scheduled review call. Never let deals die in legal — quantify cost of delay."
    ] },
    { type: 'ai_message', text: "Module 7 done. +150 XP. Next: cold call and pitch frameworks.", delay: 500, xp: 150 }
  ],

  module8: [
    { type: 'ai_message', text: "Module 8 — Cold Call & Pitch Frameworks. You get 90 seconds to earn 30 minutes. Let's make every second count.", delay: 500 },
    { type: 'ai_message', text: "The KwikAds Cold Call Formula — 4 parts, 20-30 seconds each. Total: under 2 minutes.", delay: 400 },
    { type: 'ai_message', text: "Part 1 — Hook (20s). Lead with THEIR world, not yours. Example: 'Hi [Name], I've been looking at D2C [category] brands spending ₹30L+ on Meta — most are seeing CAC climb 20-30% this year. Is that hitting you too?'", delay: 400 },
    { type: 'ai_message', text: "Part 2 — Problem (20s). Sharpen the pain. Example: 'What we're seeing is the pixel data feeding Meta has degraded post-iOS14. Agencies are optimising on noisy signals, so Meta's algorithm chases low-quality clicks.'", delay: 400 },
    { type: 'ai_message', text: "Part 3 — Differentiator (30s). One sentence, not a feature dump. Example: 'We're India's 1st Meta Signals Partner. We pipe verified checkout data from 200M+ D2C shoppers directly into Meta — brands typically see +25% ROAS and -15% CAC within 3 months.'", delay: 400 },
    { type: 'ai_message', text: "Part 4 — CTA (20s). Low-friction next step. Example: 'I'd love to run a free 3-day audit on your Meta account — no commitment, just data. Would next Tuesday work for a 20-minute call?'", delay: 400 },
    { type: 'quiz', question: "Which hook is strongest for a cold call to a D2C fashion brand CMO?", options: [
      "Hi, I'm calling from KwikAds. We're Meta's Signals Partner.",
      "Hi Priya, I've been studying fashion brands spending ₹30L+ on Meta — most are seeing CAC spike this quarter. Is that showing up in your numbers too?",
      "We can improve your ROAS by 25%.",
      "Do you have 5 minutes? I want to tell you about our product."
    ], correct: 1, explanation: "The best hook is specific (fashion, ₹30L+, CAC spike), personal (uses their name), and ends with a question that makes them talk. Never lead with your company name or a feature claim.", hint: "A good hook has three elements: their industry, a specific pain, and a question." },
    { type: 'ai_message', text: "The Pitch Deck structure (for scheduled meetings, not cold calls). 5 slides max:", delay: 400 },
    { type: 'ai_message', text: "Slide 1: Their pain (not your logo slide). Slide 2: Why it's happening (signal degradation + pixel blindness). Slide 3: How KwikAds fixes it (3 pillars, one sentence each). Slide 4: Proof (Shop Unrush +37% ROAS, BSC -15% CAC). Slide 5: The ask (audit access + timeline).", delay: 400 },
    { type: 'ai_message', text: "Rule: if you're past slide 3 and the CMO hasn't asked a question, you've lost them. Stop and ask: 'Does this map to what you're experiencing?'", delay: 400 },
    { type: 'quiz', question: "You're on a cold call. The CMO says 'We're happy with our agency.' Best immediate response:", options: [
      "Our data is better than any agency's",
      "That's great — keep them. Quick question: are they sending Meta server-side checkout signals, or browser pixel data? Because that gap is where 15-25% of ROAS hides.",
      "Can I send you a case study?",
      "What if I told you we could beat their ROAS?"
    ], correct: 1, explanation: "Never attack the agency. The CMO chose them — attacking the agency attacks their judgment. Instead, plant a seed of curiosity about signal quality. If they don't know what their agency sends Meta, you've just created doubt without being adversarial.", hint: "Don't compete with the agency. Introduce a dimension they haven't considered." },
    { type: 'practice', prompt: "Cold call a D2C supplements brand spending ₹50L/month. Their ROAS has dropped from 3x to 2.2x in 6 months. Give your full 90-second pitch: Hook → Problem → Differentiator → CTA.", keywords: ["supplements", "roas", "drop", "cac", "meta", "signals", "checkout", "200m", "audit", "pillar", "ios14", "pixel", "partner"], minKeywords: 5, goodFeedback: "That's a call that books a meeting. You personalised the pain, explained the root cause without jargon, dropped proof, and ended with a low-friction ask. Practice this until it's muscle memory.", improveFeedback: "Structure check: Hook (their ROAS dropped from 3x to 2.2x — name the pain). Problem (pixel degradation → Meta's algorithm choosing wrong audiences). Differentiator (checkout signals from 200M+ shoppers → +25% ROAS typical). CTA (free 3-day audit, no commitment). Keep each section under 30 seconds.", hint: "ROAS dropping from 3x to 2.2x in 6 months is a signal-quality problem, not a creative problem. Lead with that insight." },
    { type: 'summary_card', points: [
      "Cold call: Hook (their pain) → Problem (root cause) → Differentiator (one sentence) → CTA (audit).",
      "Pitch deck: 5 slides max. Start with their pain, end with the audit ask.",
      "Never lead with your company. Never attack their agency. Always end with a low-friction next step."
    ] },
    { type: 'ai_message', text: "Module 8 done. +150 XP. Next: the 5 objections you'll face on every deal.", delay: 500, xp: 150 }
  ],

  module9: [
    { type: 'ai_message', text: "Module 9 — Objection Handling Playbook. Five objections kill 80% of deals. Master the reframes and you'll close what everyone else drops.", delay: 500 },
    { type: 'ai_message', text: "Objection 1: 'We already have an agency.' — Frequency: every other call. This is the default shield.", delay: 400 },
    { type: 'ai_message', text: "Reframe: 'Great — keep them. We're not an agency replacement. We're a data layer your agency plugs into. Quick question: is your agency sending Meta server-side checkout signals, or browser pixel data? That gap is where 15-25% of ROAS typically hides.' — You've planted curiosity without attacking their choice.", delay: 400 },
    { type: 'ai_message', text: "Objection 2: 'Our ROAS is already 3x. Why would we change?' — This prospect is actually your best lead.", delay: 400 },
    { type: 'ai_message', text: "Reframe: '3x is excellent — most brands we talk to are at 1.5-2x. That tells me your fundamentals are strong. The question is: is 3x the ceiling, or the floor? Brands with strong fundamentals see the biggest uplift from cleaner signals. How much would 3.5x or 4x mean to your quarterly revenue?' — Anchor their win as a starting line.", delay: 400 },
    { type: 'ai_message', text: "Objection 3: 'We run ads in-house. No agencies, no partners.' — Respect the independence, then differentiate.", delay: 400 },
    { type: 'ai_message', text: "Reframe: 'I respect that — in-house teams are usually sharper than agencies because they know the brand deeply. We don't replace your team. We make every decision they make more effective by fixing what Meta sees. Even the best in-house buyer is choosing from audiences Meta builds — and Meta's model is only as good as the events feeding it.' — Position as infrastructure, not service.", delay: 400 },
    { type: 'ai_message', text: "Objection 4: 'Too expensive.' — Never concede price. Always reframe to payback.", delay: 400 },
    { type: 'ai_message', text: "Reframe: 'Fair question. Let's do the math together. You spend ₹40L/month at 2.5x ROAS — that's ₹1Cr revenue. If we lift ROAS 20%, your revenue goes to ₹1.2Cr. That's ₹20L more per month. Our fee is ₹1.5L. You're 13x positive in month 1. Does that math work for you?' — Always end with the payback multiple.", delay: 400 },
    { type: 'ai_message', text: "Objection 5: 'We tried GoKwik before. Didn't work.' — This needs surgical handling. Listen first, then separate.", delay: 400 },
    { type: 'ai_message', text: "Reframe: 'I appreciate the honesty. Can I ask what specifically didn't work? [Listen carefully]. I hear you. A lot has changed since then — [address specific issue]. But rather than me promising it's different, let me prove it. A 3-day audit costs you nothing and shows you exactly what today's setup looks like. If it doesn't impress, we shake hands and part ways.' — Acknowledge, separate past from present, let the audit do the selling.", delay: 400 },
    { type: 'quiz', question: "A CMO says: 'Your data quality claim is bold. How do I know you're not just another vendor overpromising?' Best response:", options: [
      "Trust me, we have the best data in the market",
      "Let me prove it. I'll run a 3-day audit on your live account — you'll see your own EMQ gaps and the exact signals we'd add. No commitment, just your data with our lens on it.",
      "Here are 10 case studies you can read",
      "We're backed by top investors and have 15,000+ brands"
    ], correct: 1, explanation: "When someone questions your claim, never argue — demonstrate. The audit is your proof engine. It takes their skepticism and converts it into their own data showing the gap. Case studies support, but their own data convinces.", hint: "Skepticism is earned trust waiting to happen. Let the audit convert it." },
    { type: 'practice', prompt: "A founder says: 'We tried working with a performance marketing partner last year. They promised 3x ROAS and we barely hit 1.5x. Why should I trust KwikAds?' Write your response.", keywords: ["audit", "listen", "different", "proof", "data", "checkout", "signals", "emq", "risk", "commitment", "show"], minKeywords: 4, goodFeedback: "Strong. You acknowledged the bad experience, separated KwikAds from generic performance partners, and offered the audit as zero-risk proof. That's how you rebuild trust with burned founders.", improveFeedback: "Structure: 1) Acknowledge ('That's frustrating and I hear you'), 2) Ask what went wrong ('What specifically didn't deliver?'), 3) Separate ('Most partners optimise on pixel data — we're different because...'), 4) Prove ('3-day audit, your data, no commitment'). Don't promise outcomes — promise transparency.", hint: "Burned founders need two things: acknowledgment and proof. Not promises." },
    { type: 'summary_card', points: [
      "5 objections: agency ('data layer, not replacement'), good ROAS ('floor not ceiling'), in-house ('infrastructure not service'), pricing ('payback math'), past experience ('audit to prove').",
      "Never attack the incumbent. Never concede price. Always reframe to value.",
      "The audit is the answer to every objection. When in doubt, offer the audit."
    ] },
    { type: 'ai_message', text: "Module 9 done. +150 XP. Next: real case studies with real numbers.", delay: 500, xp: 150 }
  ],

  module10: [
    { type: 'ai_message', text: "Module 10 — Case Studies & Proof Arsenal. Case studies are mirrors — the prospect needs to see themselves in the story. Match the case to their stage, pain, and scale.", delay: 500 },
    { type: 'ai_message', text: "Case Study 1: Shop Unrush — Sustainable fashion. The ROAS-uplift proof point.", delay: 400 },
    { type: 'stat_card', stats: [
      { value: "+37%", label: "ROAS Improvement", subtext: "Signal-fed audiences vs. pixel" },
      { value: "Same spend", label: "Budget unchanged", subtext: "Creatives held constant" },
      { value: "Checkout signals", label: "The unlock", subtext: "Verified purchase intent from GoKwik network" }

// ============ ERROR BOUNDARY ============
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) { console.error('KwikAds Academy Error:', error, info); }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', { className: 'flex flex-col items-center justify-center min-h-screen bg-black text-white p-8' },
        React.createElement('h1', { className: 'text-2xl font-bold mb-4' }, 'Something went wrong'),
        React.createElement('p', { className: 'text-gray-400 mb-6 text-center max-w-md' },
          'The module encountered an error. Your progress has been saved. Click below to go back.'),
        React.createElement('button', {
          className: 'px-6 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-lg font-semibold transition',
          onClick: () => { this.setState({ hasError: false, error: null }); window.location.reload(); }
        }, 'Reload Academy')
      );
    }
    return this.props.children;
  }
}

// ============ PROGRESS PERSISTENCE ============
const STORAGE_KEY = 'kwikads_academy_progress';

function loadProgress(userId) {
  try {
    const saved = localStorage.getItem(STORAGE_KEY + '_' + userId);
    if (saved) {
      const parsed = JSON.parse(saved);
      return { xp: parsed.xp || 0, level: parsed.level || 1, streak: parsed.streak || 0, modulesComplete: parsed.modulesComplete || 0 };
    }
  } catch (e) { console.warn('Failed to load progress:', e); }
  return null;
}

function saveProgress(userId, stats) {
  try {
    localStorage.setItem(STORAGE_KEY + '_' + userId, JSON.stringify(stats));
  } catch (e) { console.warn('Failed to save progress:', e); }
}

function KwikAdsAcademy() {
  const [page, setPage] = React.useState('login'); // login, home, module, challenge, scenario, admin
  const [user, setUser] = React.useState(null);
  const [currentModule, setCurrentModule] = React.useState(null);
  const [currentChallenge, setCurrentChallenge] = React.useState(null);
  const [currentScenario, setCurrentScenario] = React.useState(null);
  const [messages, setMessages] = React.useState([]);
  const [conversationStep, setConversationStep] = React.useState(0);
  const [userInput, setUserInput] = React.useState('');
  const [stats, setStats] = React.useState({ xp: 0, level: 1, streak: 0, modulesComplete: 0 });
  const [selectedAnswer, setSelectedAnswer] = React.useState(null);
  const [quizFeedback, setQuizFeedback] = React.useState(null);
  const [isLoading, setIsLoading] = React.useState(false);
  const [showHint, setShowHint] = React.useState(false);
  const chatRef = React.useRef(null);
  // Refs to avoid stale-closure bugs when chaining advance() via setTimeout
  const conversationStepRef = React.useRef(0);
  const messagesRef = React.useRef([]);
  const pageRef = React.useRef(page);
  const currentModuleRef = React.useRef(currentModule);
  const currentChallengeRef = React.useRef(currentChallenge);
  const currentScenarioRef = React.useRef(currentScenario);
  React.useEffect(() => { conversationStepRef.current = conversationStep; }, [conversationStep]);
  React.useEffect(() => { messagesRef.current = messages; }, [messages]);
  React.useEffect(() => { pageRef.current = page; }, [page]);
  React.useEffect(() => { currentModuleRef.current = currentModule; }, [currentModule]);
  React.useEffect(() => { currentChallengeRef.current = currentChallenge; }, [currentChallenge]);
  React.useEffect(() => { currentScenarioRef.current = currentScenario; }, [currentScenario]);

  // Persist progress to localStorage on every stats change
  React.useEffect(() => {
    if (user?.id) { saveProgress(user.id, stats); }
  }, [stats, user]);

  // Auto-scroll to latest message
  React.useEffect(() => {
    if (chatRef.current) {
      setTimeout(() => chatRef.current.scrollTop = chatRef.current.scrollHeight, 50);
    }
  }, [messages]);

  // Handle Google SSO login
  const handleGoogleLogin = React.useCallback((response) => {
    try {
      const payload = decodeJwt(response.credential);
      const email = payload.email?.toLowerCase();
      const domain = email?.split('@')[1];

      // Only allow @gokwik.co emails
      if (domain !== 'gokwik.co') {
        alert('Access restricted to @gokwik.co accounts only.');
        return;
      }

      // Check if user is in authorized list
      const authorized = AUTHORIZED_USERS[email];
      if (authorized) {
        const userData = { ...authorized, id: email.split('@')[0].replace('.', '_'), email, picture: payload.picture };
        setUser(userData);
        // Restore saved progress from localStorage
        const saved = loadProgress(userData.id);
        if (saved) setStats(saved);
        setPage(userData.role === 'Manager' ? 'admin' : 'home');
      } else {
        // Any @gokwik.co user can access as Sales Rep by default
        const userData = {
          name: payload.name || email.split('@')[0],
          role: 'Sales Rep',
          team: 'SMB',
          id: email.split('@')[0].replace('.', '_'),
          email,
          picture: payload.picture
        };
        setUser(userData);
        const saved = loadProgress(userData.id);
        if (saved) setStats(saved);
        setPage('home');
      }
    } catch (err) {
      console.error('Google Sign-In error:', err);
      alert('Sign-in failed. Please try again.');
    }
  }, []);

  // Register the Google callback
  React.useEffect(() => {
    _googleLoginCallback = handleGoogleLogin;
    return () => { _googleLoginCallback = null; };
  }, [handleGoogleLogin]);

  // Handle manual login (fallback for testing)
  const handleManualLogin = (username, password) => {
    const users = {
      'deepak': { name: 'Deepak', role: 'Sales Rep', team: 'SMB' },
      'sankalp': { name: 'Sankalp', role: 'Manager', team: 'Admin' },
      'vignesh': { name: 'Vignesh', role: 'Sales Rep', team: 'Enterprise' },
      'karan': { name: 'Karan', role: 'Manager', team: 'Admin' },
      'reviewer': { name: 'Test Reviewer', role: 'Sales Rep', team: 'QA' }
    };
    if (users[username] && password === 'admin123') {
      const userData = { ...users[username], id: username };
      setUser(userData);
      // Restore saved progress from localStorage
      const saved = loadProgress(userData.id);
      if (saved) setStats(saved);
      setPage(userData.role === 'Manager' ? 'admin' : 'home');
    } else {
      alert('Invalid credentials');
    }
  };

  // Helper: resolve the active flow — uses REFS to avoid stale closures in setTimeout chains
  const getFlow = React.useCallback(() => {
    const p = pageRef.current;
    const mod = currentModuleRef.current;
    const ch = currentChallengeRef.current;
    const sc = currentScenarioRef.current;
    if (p === 'scenario' && sc) {
      return scenarios[`scenario${sc}`]?.flow || null;
    } else if (p === 'challenge' && ch) {
      return ch === 1 ? weekOneChallengeFlow : weekTwoChallengeFlow;
    } else if (p === 'module' && mod) {
      return moduleFlows[`module${mod}`] || null;
    }
    return null;
  }, []); // no deps — reads from refs, always fresh

  // Start module conversation
  const startModule = (moduleNum) => {
    setCurrentModule(moduleNum);
    setPage('module');
    setMessages([]);
    messagesRef.current = [];
    setConversationStep(0);
    conversationStepRef.current = 0;
    setSelectedAnswer(null);
    setQuizFeedback(null);
    setShowHint(false);
  };

  // Advance conversation — uses refs throughout to eliminate stale-closure bugs
  const advanceConversation = React.useCallback(() => {
    try {
      const flow = getFlow();
      if (!flow || !Array.isArray(flow)) return;

      const stepIdx = conversationStepRef.current;
      // End-of-flow — navigate back to home so user isn't stuck on a dead Continue
      if (stepIdx >= flow.length) {
        const p = pageRef.current;
        if (p === 'module') { setCurrentModule(null); setPage('home'); }
        else if (p === 'challenge') { setCurrentChallenge(null); setPage('home'); }
        else if (p === 'scenario') { setCurrentScenario(null); setPage('home'); }
        return;
      }

      const step = flow[stepIdx];
      if (!step || !step.type) {
        // Skip malformed steps instead of crashing
        console.warn('Skipping malformed step at index', stepIdx);
        conversationStepRef.current = stepIdx + 1;
        setConversationStep(stepIdx + 1);
        return;
      }

      let newMessage = null;

      if (step.type === 'ai_message') {
        const text = (step.text || '').replace('{name}', user?.name || '');
        newMessage = { type: 'ai', text, delay: step.delay };
        // XP + completion tracking — uses ref for currentModule to avoid stale closure
        if (step.xp) {
          const mod = currentModuleRef.current;
          setStats(prev => {
            const newXp = prev.xp + step.xp;
            const newLevel = Math.floor(newXp / 300) + 1;
            const isLastStep = stepIdx === flow.length - 1;
            const newModulesComplete = isLastStep && mod && mod > prev.modulesComplete
              ? mod
              : prev.modulesComplete;
            return { ...prev, xp: newXp, level: newLevel, modulesComplete: Math.min(newModulesComplete, 10), streak: prev.streak + (isLastStep ? 1 : 0) };
          });
        }
      } else if (step.type === 'stat_card') {
        newMessage = { type: 'stat_card', stats: step.stats || [] };
      } else if (step.type === 'quick_reply') {
        newMessage = { type: 'quick_reply', options: step.options || [], nextMap: step.nextMap || {} };
      } else if (step.type === 'quiz') {
        newMessage = { type: 'quiz', question: step.question, options: step.options || [], correct: step.correct, explanation: step.explanation, hint: step.hint };
      } else if (step.type === 'practice') {
        newMessage = { type: 'practice', prompt: step.prompt, keywords: step.keywords || [], minKeywords: step.minKeywords || 1, goodFeedback: step.goodFeedback || '', improveFeedback: step.improveFeedback || '', hint: step.hint };
      } else if (step.type === 'summary_card') {
        newMessage = { type: 'summary_card', points: step.points || [] };
      } else {
        // Unknown step type — skip it
        console.warn('Unknown step type:', step.type, 'at index', stepIdx);
      }

      if (newMessage) {
        setMessages(prev => {
          const next = [...prev, newMessage];
          messagesRef.current = next;
          return next;
        });
      }

      const nextIdx = stepIdx + 1;
      conversationStepRef.current = nextIdx;
      setConversationStep(nextIdx);
      setShowHint(false);
    } catch (err) {
      console.error('advanceConversation error:', err);
      // Recover: go home instead of crashing
      setPage('home');
      setCurrentModule(null);
      setCurrentChallenge(null);
      setCurrentScenario(null);
    }
  }, [getFlow, user]);

  // Stable ref for advanceConversation so setTimeout always calls the latest version
  const advanceRef = React.useRef(advanceConversation);
  React.useEffect(() => { advanceRef.current = advanceConversation; }, [advanceConversation]);
  const safeAdvance = React.useCallback(() => { try { advanceRef.current(); } catch(e) { console.error('safeAdvance error:', e); } }, []);

  // Handle quick reply click — uses functional setState + refs, no stale closures
  const handleQuickReply = (optionIndex, nextMap) => {
    try {
      setMessages(prev => {
        const last = prev[prev.length - 1];
        const text = last?.options?.[optionIndex] || '';
        const next = [...prev, { type: 'user', text }];
        messagesRef.current = next;
        return next;
      });
      const nextStep = nextMap?.[optionIndex] ?? (conversationStepRef.current + 1);
      conversationStepRef.current = nextStep;
      setConversationStep(nextStep);
      setTimeout(safeAdvance, 400);
    } catch (e) { console.error('handleQuickReply error:', e); }
  };

  // Handle quiz answer — uses functional setState + refs
  const handleQuizAnswer = (optionIndex, correct, explanation) => {
    try {
      setSelectedAnswer(optionIndex);
      setQuizFeedback({ correct: optionIndex === correct, explanation });
      setTimeout(() => {
        try {
          setMessages(prev => {
            const last = prev[prev.length - 1];
            const text = last?.options?.[optionIndex] || '';
            const next = [...prev, { type: 'user', text }];
            messagesRef.current = next;
            return next;
          });
          setSelectedAnswer(null);
          setQuizFeedback(null);
          setTimeout(safeAdvance, 700);
        } catch (e) { console.error('handleQuizAnswer inner error:', e); }
      }, 2000);
    } catch (e) { console.error('handleQuizAnswer error:', e); }
  };

  // Handle practice response — uses functional setState + refs
  const handlePracticeSend = () => {
    try {
      const input = userInput.trim();
      if (!input) return;
      const last = messagesRef.current[messagesRef.current.length - 1];
      if (!last || last.type !== 'practice') return;

      const keywordMatches = (last.keywords || []).filter(k => input.toLowerCase().includes(k.toLowerCase())).length;
      const passed = keywordMatches >= (last.minKeywords || 1);
      const feedback = passed ? (last.goodFeedback || 'Good job!') : (last.improveFeedback || 'Keep improving!');
      const coachPrefix = passed ? "✅ Coach: " : "💡 Coach: ";

      setMessages(prev => {
        const next = [...prev, { type: 'user', text: input }, { type: 'ai', text: coachPrefix + feedback }];
        messagesRef.current = next;
        return next;
      });
      setUserInput('');
      setTimeout(safeAdvance, 1400);
    } catch (e) { console.error('handlePracticeSend error:', e); }
  };

  // Render login
  if (page === 'login') {
    return (
      <div className="flex items-center justify-center min-h-screen bg-black">
        <LoginCard onManualLogin={handleManualLogin} />
      </div>
    );
  }

  // Render admin dashboard
  if (page === 'admin' && user?.role === 'Manager') {
    return (
      <AdminDashboard
        user={user}
        onLogout={() => { setUser(null); setPage('login'); }}
        onSwitchToLearner={() => setPage('home')}
      />
    );
  }

  // Render home
  if (page === 'home') {
    return (
      <HomeScreen
        user={user}
        stats={stats}
        onStartModule={startModule}
        onStartChallenge={(challengeNum) => { setCurrentChallenge(challengeNum); setPage('challenge'); setMessages([]); messagesRef.current = []; setConversationStep(0); conversationStepRef.current = 0; setSelectedAnswer(null); setQuizFeedback(null); setShowHint(false); }}
        onStartScenario={(scenarioNum) => { setCurrentScenario(scenarioNum); setPage('scenario'); setMessages([]); messagesRef.current = []; setConversationStep(0); conversationStepRef.current = 0; setSelectedAnswer(null); setQuizFeedback(null); setShowHint(false); }}
        onLogout={() => { setUser(null); setPage('login'); }}
        onSwitchToAdmin={user?.role === 'Manager' ? () => setPage('admin') : null}
      />
    );
  }

  // Render module conversation
  if (page === 'module' && currentModule) {
    return (
      <ConversationScreen
        title={`Module ${currentModule}: ${['Welcome to GoKwik', 'The KwikAds Weapon', 'The Problem We Solve', 'Signals That Win', 'The Money Talk', 'Selling Like a Consultant', 'The Client Journey', 'Demo Day', 'Handling Pushback', 'Proof That It Works'][currentModule - 1]}`}
        messages={messages}
        onAdvance={advanceConversation}
        onQuickReply={handleQuickReply}
        onQuizAnswer={handleQuizAnswer}
        onPracticeSend={handlePracticeSend}
        userInput={userInput}
        setUserInput={setUserInput}
        selectedAnswer={selectedAnswer}
        quizFeedback={quizFeedback}
        chatRef={chatRef}
        onBack={() => { setPage('home'); setCurrentModule(null); }}
      />
    );
  }

  // Render challenge
  if (page === 'challenge' && currentChallenge) {
    return (
      <ConversationScreen
        title={currentChallenge === 1 ? "Week 1 Challenge: Product Mastery" : "Week 2 Challenge: Sales Simulation"}
        messages={messages}
        onAdvance={advanceConversation}
        onQuickReply={handleQuickReply}
        onQuizAnswer={handleQuizAnswer}
        onPracticeSend={handlePracticeSend}
        userInput={userInput}
        setUserInput={setUserInput}
        selectedAnswer={selectedAnswer}
        quizFeedback={quizFeedback}
        chatRef={chatRef}
        onBack={() => { setPage('home'); setCurrentChallenge(null); }}
      />
    );
  }

  // Render scenario
  if (page === 'scenario' && currentScenario) {
    const scenario = scenarios[`scenario${currentScenario}`];
    return (
      <ConversationScreen
        title={`Scenario ${currentScenario}: ${scenario.title}`}
        messages={messages}
        onAdvance={advanceConversation}
        onQuickReply={handleQuickReply}
        onQuizAnswer={handleQuizAnswer}
        onPracticeSend={handlePracticeSend}
        userInput={userInput}
        setUserInput={setUserInput}
        selectedAnswer={selectedAnswer}
        quizFeedback={quizFeedback}
        chatRef={chatRef}
        onBack={() => { setPage('home'); setCurrentScenario(null); }}
      />
    );
  }

  return null;
}

    { num: 4, title: 'Signals That Win' },
    { num: 5, title: 'The Money Talk' },
    { num: 6, title: 'Selling Like a Consultant' },
    { num: 7, title: 'The Client Journey' },
    { num: 8, title: 'Demo Day' },
    { num: 9, title: 'Handling Pushback' },
    { num: 10, title: 'Proof That It Works' }
  ];

  const completedModules = stats.modulesComplete;

  return (
    <div className="min-h-screen bg-black text-white p-8">
      <div className="max-w-6xl mx-auto">
        {/* Header */}
        <div className="flex justify-between items-center mb-6">
          <div>
            <h1 className="text-4xl font-bold mb-2">Welcome back, {user.name}</h1>
            <p className="text-gray-400">
              {(() => {
                const c = stats.modulesComplete;
                if (c === 0) return "Let's get you shipping in 10 days. Module 1 takes ~6 minutes.";
                if (c >= 10) return "All 10 modules cleared. Time to apply it live — jump into the Scenarios.";
                const pct = Math.round(c / 10 * 100);
                return `You're ${pct}% through. Next up: Module ${c + 1}. I'll keep it tight — promise.`;
              })()}
            </p>
          </div>
          <div className="flex items-center gap-3">
            {onSwitchToAdmin && (
              <button
                onClick={onSwitchToAdmin}
                className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 rounded text-sm font-semibold transition"
              >
                Admin Dashboard
              </button>
            )}
            <button
              onClick={onLogout}
              className="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded text-sm transition"
            >
              Sign Out
            </button>
            {user.picture && (
              <img src={user.picture} alt={user.name} className="w-9 h-9 rounded-full border-2 border-emerald-600" referrerPolicy="no-referrer" />
            )}
          </div>
        </div>

        {/* Stats Row */}
        <div className="grid grid-cols-4 gap-4 mb-12">
          <StatCard icon="⚡" value={`${stats.xp}`} label="XP" />
          <StatCard icon="🎯" value={`${stats.level}`} label="Level" />
          <StatCard icon="🔥" value={`${stats.streak}`} label="Streak" />
          <StatCard icon="✅" value={`${stats.modulesComplete}/10`} label="Modules Done" />
        </div>

        {/* Module Journey */}
        <div className="mb-12">
          <h2 className="text-lg font-semibold mb-6">Your Learning Path</h2>
          <div className="flex gap-3 overflow-x-auto pb-4">
            {modules.map((mod, idx) => (
              <div
                key={mod.num}
                onClick={() => idx <= completedModules && onStartModule(mod.num)}
                className={`w-10 h-10 rounded-full flex items-center justify-center font-semibold transition ${
                  idx < completedModules
                    ? 'bg-green-600 text-white cursor-pointer hover:bg-green-500'
                    : idx === completedModules
                    ? 'bg-emerald-600 text-white gokwik-pulse cursor-pointer'
                    : 'bg-gray-700 text-gray-400 cursor-not-allowed'
                }`}
                title={idx <= completedModules ? `${mod.title} (click to ${idx < completedModules ? 'review' : 'start'})` : `${mod.title} (locked)`}
              >
                {idx < completedModules ? '✓' : mod.num}
              </div>
            ))}
          </div>
        </div>

        {/* Continue Learning */}
        <button
          onClick={() => completedModules < 10 && onStartModule(completedModules + 1)}
          disabled={completedModules >= 10}
          className={`w-full py-4 text-white font-semibold rounded-lg mb-12 transition ${completedModules >= 10 ? 'bg-green-700 cursor-default' : 'bg-emerald-600 hover:bg-emerald-700'}`}
        >
          {completedModules === 0 ? 'Start Module 1' : completedModules >= 10 ? 'All Modules Complete! Review any module below.' : `Continue Module ${completedModules + 1}`}
        </button>

        {/* Modules Grid */}
        <div className="mb-12">
          <h2 className="text-lg font-semibold mb-6">All Modules</h2>
          <div className="grid grid-cols-2 gap-4">
            {modules.map((mod) => (
              <ModuleCard
                key={mod.num}
                module={mod}
                isCompleted={mod.num <= completedModules}
                isCurrent={mod.num === completedModules + 1}
                onClick={() => onStartModule(mod.num)}
              />
            ))}
          </div>
        </div>

        {/* Challenges */}
        <div className="mb-12">
          <h2 className="text-lg font-semibold mb-6">Challenges</h2>
          <div className="grid grid-cols-2 gap-4">
            <ChallengeCard title="Week 1: Product Mastery" description="15 rapid-fire questions" onClick={() => onStartChallenge(1)} />
            <ChallengeCard title="Week 2: Sales Simulation" description="3 client role-plays" onClick={() => onStartChallenge(2)} />
          </div>
        </div>

        {/* Scenarios */}
        <div>
          <h2 className="text-lg font-semibold mb-6">Scenario Assessments</h2>
          <div className="grid grid-cols-2 gap-4">
            <ScenarioCard title="Scenario 1: The Skeptical CMO" description="₹35L/month, 2.1x ROAS" onClick={() => onStartScenario(1)} />
            <ScenarioCard title="Scenario 2: The Budget-Conscious Founder" description="₹8L/month, 1.3x ROAS" onClick={() => onStartScenario(2)} />
            <ScenarioCard title="Scenario 3: The Current Winner" description="3.5x ROAS, why switch?" onClick={() => onStartScenario(3)} />
            <ScenarioCard title="Scenario 4: The Enterprise Play" description="₹60L/month, integration questions" onClick={() => onStartScenario(4)} />
          </div>
        </div>
      </div>
    </div>
  );
}

function StatCard({ icon, value, label }) {
  return (
    <div className="bg-gray-900 border border-gray-800 rounded-lg p-4 text-center">
      <div className="text-3xl mb-2">{icon}</div>
      <div className="text-2xl font-bold text-white">{value}</div>
      <div className="text-sm text-gray-400">{label}</div>
    </div>
  );
}

function ModuleCard({ module, isCompleted, isCurrent, onClick }) {
  return (
    <button
      onClick={(isCompleted || isCurrent) ? onClick : undefined}
      className={`p-4 rounded-lg text-left transition border ${
        isCompleted
          ? 'bg-green-950 border-green-700 cursor-pointer hover:border-green-500'
          : isCurrent
          ? 'bg-emerald-950 border-emerald-600 gokwik-pulse cursor-pointer'
          : 'bg-gray-900 border-gray-800 opacity-50 cursor-not-allowed'
      }`}
    >
      <div className="flex items-start justify-between">
        <div>
          <h3 className="font-semibold text-white">{module.title}</h3>
          <p className="text-sm text-gray-400 mt-1">{isCompleted ? '✓ Completed' : isCurrent ? 'Continue' : 'Locked'}</p>
        </div>
        {isCompleted && <span className="text-green-400 text-xl">✓</span>}
      </div>
    </button>
  );
}

function ChallengeCard({ title, description, onClick }) {
  return (
    <button
      onClick={onClick}
      className="p-4 rounded-lg bg-gray-900 border border-gray-800 hover:border-gray-700 transition text-left"
    >
      <h3 className="font-semibold text-white">{title}</h3>
      <p className="text-sm text-gray-400 mt-2">{description}</p>
    </button>
  );
}

function ScenarioCard({ title, description, onClick }) {
  return (
    <button
      onClick={onClick}
      className="p-4 rounded-lg bg-gray-900 border border-gray-800 hover:border-gray-700 transition text-left"
    >
      <h3 className="font-semibold text-white">{title}</h3>
      <p className="text-sm text-gray-400 mt-2">{description}</p>
    </button>
  );
}

function ConversationScreen({
  title,
  messages,
  onAdvance,
  onQuickReply,
  onQuizAnswer,
  onPracticeSend,
  userInput,
  setUserInput,
  selectedAnswer,
  quizFeedback,
  chatRef,
  onBack
}) {
  React.useEffect(() => {
    if (messages.length === 0) {
      onAdvance();
    }
  }, []);

  const lastMessage = messages[messages.length - 1];
  const hasInput = lastMessage?.type === 'practice';
  const hasQuickReply = lastMessage?.type === 'quick_reply';
  const hasQuiz = lastMessage?.type === 'quiz';

  return (
    <div className="flex flex-col h-screen bg-black text-white">
      {/* Header */}
      <div className="border-b border-gray-800 p-4 flex justify-between items-center">
        <h1 className="font-semibold">{title}</h1>
        <button
          onClick={onBack}
          className="px-3 py-1 bg-gray-800 hover:bg-gray-700 rounded text-sm transition"
        >
          ← Back
        </button>
      </div>

      {/* Chat */}
      <div
        ref={chatRef}
        className="flex-1 overflow-y-auto p-6 chat-container"
      >
        <div className="max-w-2xl mx-auto space-y-4">
          {messages.map((msg, idx) => (
            <MessageBubble
              key={idx}
              message={msg}
              isSelected={selectedAnswer}
              onQuickReply={onQuickReply}
              onQuizAnswer={onQuizAnswer}
              quizFeedback={quizFeedback}
            />
          ))}
        </div>
      </div>

      {/* Input Area */}
      <div className="border-t border-gray-800 p-4 bg-black">
        {hasInput && (
          <div className="max-w-2xl mx-auto">
            <textarea
              value={userInput}
              onChange={(e) => setUserInput(e.target.value)}
              placeholder="Type your response..."
              className="w-full px-4 py-3 bg-gray-900 border border-gray-800 rounded-lg text-white placeholder-gray-500 focus:border-emerald-600 resize-none"
              rows="3"
            />
            <button
              onClick={() => onPracticeSend(lastMessage)}
              disabled={!userInput.trim()}
              className="mt-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 text-white rounded-lg transition"
            >
              Send
            </button>
          </div>
        )}

        {!hasInput && !hasQuickReply && !hasQuiz && (
          <div className="max-w-2xl mx-auto">
            <button
              onClick={onAdvance}
              className="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg transition font-semibold"
            >
              Continue
            </button>
          </div>
        )}

        {!hasInput && !hasQuickReply && !hasQuiz && (
          <p className="text-sm text-gray-500 text-center mt-2">Press Enter or click Continue</p>
        )}
      </div>
    </div>
  );
}

function MessageBubble({
  message,
  isSelected,
  onQuickReply,
  onQuizAnswer,
  quizFeedback
}) {
  if (message.type === 'ai') {
    return (
      <div className="message-enter">
        <div className="bg-gray-900 border border-gray-800 rounded-lg p-4 max-w-xl">
          <p className="text-gray-100 text-sm leading-relaxed">{message.text}</p>
        </div>
      </div>
    );
  }

  if (message.type === 'user') {
    return (
      <div className="message-enter flex justify-end">
        <div className="bg-emerald-600 rounded-lg p-4 max-w-xl">
          <p className="text-white text-sm">{message.text}</p>
        </div>
      </div>
    );
  }

  if (message.type === 'stat_card') {
    return (
      <div className="message-enter stat-card grid grid-cols-3 gap-3">
        {message.stats.map((stat, idx) => (
          <div
            key={idx}
            className="bg-gray-900 border border-gray-800 rounded-lg p-4 text-center"
          >
            <div className="text-2xl font-bold text-emerald-400">{stat.value}</div>
            <div className="text-xs text-gray-400 mt-1">{stat.label}</div>
            {stat.subtext && <div className="text-xs text-gray-500 mt-0.5">{stat.subtext}</div>}
          </div>
        ))}
      </div>
    );
  }

  if (message.type === 'summary_card') {
    return (
      <div className="message-enter bg-gradient-to-r from-emerald-900 to-gray-900 border border-emerald-800 rounded-lg p-6">
        <h3 className="font-semibold text-white mb-3">Key Takeaway</h3>
        <ul className="space-y-2 text-sm text-gray-100">
          {message.points.map((point, idx) => (
            <li key={idx} className="flex gap-2">
              <span className="text-emerald-400 font-bold">•</span>
              {point}
            </li>
          ))}
        </ul>
      </div>
    );
  }

  if (message.type === 'quick_reply') {
    return (
      <div className="message-enter flex gap-2 flex-wrap">
        {message.options.map((option, idx) => (
          <button
            key={idx}
            onClick={() => onQuickReply(idx, message.nextMap)}
            className="px-4 py-2 bg-gray-800 hover:bg-emerald-600 border border-gray-700 hover:border-emerald-600 rounded-lg text-sm transition"
          >
            {option}
          </button>
        ))}
      </div>
    );
  }

  if (message.type === 'quiz') {
    return (
      <div className="message-enter space-y-3">
        <p className="text-sm font-semibold text-gray-100">{message.question}</p>
        {message.hint && isSelected === null && (
          <HintReveal hint={message.hint} />
        )}
        <div className="space-y-2">
          {message.options.map((option, idx) => (
            <button
              key={idx}
              onClick={() => onQuizAnswer(idx, message.correct, message.explanation)}
              disabled={isSelected !== null}
              className={`w-full p-3 rounded-lg text-left text-sm transition ${
                isSelected === null
                  ? 'bg-gray-800 hover:bg-gray-700 border border-gray-700'
                  : idx === message.correct
                  ? 'bg-green-900 border border-green-700'
                  : idx === isSelected
                  ? 'bg-red-900 border border-red-700'
                  : 'bg-gray-800 border border-gray-700 opacity-50'
              }`}
            >
              {option}
            </button>
          ))}
        </div>
        {quizFeedback && (
          <div className={`p-3 rounded-lg text-sm ${quizFeedback.correct ? 'bg-green-900 text-green-100' : 'bg-yellow-900 text-yellow-100'}`}>
            {quizFeedback.explanation}
          </div>
        )}
      </div>
    );
  }

  if (message.type === 'practice') {
    return (
      <div className="message-enter space-y-3">
        <p className="text-sm font-semibold text-gray-100">{message.prompt}</p>
        {message.hint && <HintReveal hint={message.hint} />}
      </div>
    );
  }

  return null;
}

function HintReveal({ hint }) {
  const [open, setOpen] = React.useState(false);
  if (!open) {
    return (
      <button
        onClick={() => setOpen(true)}
        className="text-xs text-emerald-400 hover:text-emerald-300 underline underline-offset-2"
      >
        💡 Need a coach nudge?
      </button>
    );
  }
  return (
    <div className="text-xs bg-emerald-950 border border-emerald-800 text-emerald-100 rounded-md p-3">
      <span className="font-semibold">Coach:</span> {hint}
    </div>
  );
}

function AdminDashboard({ user, onLogout, onSwitchToLearner }) {
  const [teamMembers, setTeamMembers] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(null);

  React.useEffect(() => {
    setLoading(true);
    fetch(API_URL + '?action=getAllProgress')
      .then(r => r.json())
      .then(data => {
        if (data.success && data.progress) {
          const members = data.progress
            .filter(p => p.userId !== 'sankalp')
            .map(p => ({
              name: p.name || p.userId,
              level: Math.floor((p.xp || 0) / 300) + 1,
              modulesComplete: p.modulesComplete || 0,
              xp: p.xp || 0,
              lastActive: p.lastActive || 'Never'
            }));
          setTeamMembers(members);
        } else {
          // Fallback: show team with 0 progress
          setTeamMembers([
            { name: 'Deepak', level: 1, modulesComplete: 0, xp: 0, lastActive: 'Not started' },
            { name: 'Vignesh', level: 1, modulesComplete: 0, xp: 0, lastActive: 'Not started' }
          ]);
        }
        setLoading(false);
      })
      .catch(err => {
        console.error('Failed to fetch progress:', err);
        // Fallback on error
        setTeamMembers([
          { name: 'Deepak', level: 1, modulesComplete: 0, xp: 0, lastActive: 'Not started' },
          { name: 'Vignesh', level: 1, modulesComplete: 0, xp: 0, lastActive: 'Not started' }
        ]);
        setLoading(false);
      });
  }, []);

  const avgCompletion = teamMembers.length > 0
    ? Math.round(teamMembers.reduce((sum, m) => sum + m.modulesComplete, 0) / teamMembers.length / 10 * 100)
    : 0;
  const avgLevel = teamMembers.length > 0
    ? (teamMembers.reduce((sum, m) => sum + m.level, 0) / teamMembers.length).toFixed(1)
    : 0;

  return (
    <div className="min-h-screen bg-black text-white p-8">
      <div className="max-w-6xl mx-auto">
        <div className="flex justify-between items-center mb-12">
          <h1 className="text-3xl font-bold">Academy Admin</h1>
          <div className="flex gap-3">
            <button
              onClick={onSwitchToLearner}
              className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 rounded text-sm font-semibold transition"
            >
              My Learning
            </button>
            <button
              onClick={onLogout}
              className="px-4 py-2 bg-gray-800 hover:bg-gray-700 rounded text-sm transition"
            >
              Sign Out
            </button>
          </div>
        </div>

        {/* Team Stats */}
        <div className="grid grid-cols-3 gap-4 mb-12">
          <StatCard icon="👥" value={`${teamMembers.length}`} label="Team Members" />
          <StatCard icon="📊" value={`${avgCompletion}%`} label="Avg Completion" />
          <StatCard icon="⭐" value={avgLevel} label="Avg Level" />
        </div>

        {/* Team Members */}
        <div>
          <h2 className="text-lg font-semibold mb-6">Team Progress</h2>
          {loading ? (
            <div className="text-center py-12 text-gray-400">Loading team progress...</div>
          ) : (
          <div className="bg-gray-900 border border-gray-800 rounded-lg overflow-hidden">
            {teamMembers.map((member, idx) => (
              <div
                key={idx}
                className={`p-4 flex justify-between items-center border-b border-gray-800 last:border-b-0 ${
                  idx % 2 === 0 ? 'bg-gray-800' : 'bg-black'
                }`}
              >
                <div>
                  <p className="font-semibold text-white">{member.name}</p>
                  <p className="text-sm text-gray-400">Level {member.level} • {member.modulesComplete} modules • {member.xp} XP • Last active: {member.lastActive}</p>
                </div>
                <div className="text-right">
                  <p className="font-semibold text-emerald-400">{member.modulesComplete}/10</p>
                  <div className="w-24 h-2 bg-gray-700 rounded-full mt-1">
                    <div className="h-2 bg-emerald-500 rounded-full" style={{width: `${member.modulesComplete * 10}%`}}></div>
                  </div>
                </div>
              </div>
            ))}
            {teamMembers.length === 0 && (
              <div className="text-center py-8 text-gray-400">No team members found</div>
            )}
          </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ============ RENDER ============

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><KwikAdsAcademy /></ErrorBoundary>);
</script>
</body>
</html>
