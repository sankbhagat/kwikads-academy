<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KwikAds Sales Academy — Value Seller Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

    --navy:#0B1F66; --navy-2:#0E2C9C; --blue:#2A5BFF; --blue-soft:#EAF0FF;
    --yellow:#F5B700; --bg:#F7F8FB; --card:#FFFFFF; --ink:#0B1226; --ink-2:#3A4368;
    --muted:#7A82A0; --line:#E5E8F0; --green:#16A34A; --red:#DC2626; --amber:#D97706;
    --shadow:0 1px 2px rgba(11,18,38,.04), 0 4px 14px rgba(11,18,38,.06);
    --radius:14px; --radius-sm:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:var(--blue);text-decoration:none}
  a:hover{text-decoration:underline}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:15px}
  h1,h2,h3,h4{margin:0 0 8px;color:var(--ink);letter-spacing:-.01em}
  h1{font-size:28px;font-weight:800;letter-spacing:-.02em}
  h2{font-size:22px;font-weight:700}
  h3{font-size:18px;font-weight:700}
  h4{font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-2)}
  p{margin:0 0 12px}
  hr{border:none;border-top:1px solid var(--line);margin:20px 0}
  code{background:#F0F3FA;padding:1px 6px;border-radius:6px;font-size:13px}
  /* layout */
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .sidebar{background:#0B1226;color:#fff;padding:22px 16px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:8px}
  .brand{display:flex;align-items:center;gap:10px;padding:0 6px 18px;border-bottom:1px solid #1E2545;margin-bottom:14px}
  .brand-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--blue) 0%,var(--yellow) 100%);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff}
  .brand-name{font-weight:800;letter-spacing:-.01em}
  .brand-sub{font-size:11px;color:#9AA3C7}
  .nav-section{font-size:11px;color:#7A82A0;text-transform:uppercase;letter-spacing:.1em;margin:14px 6px 6px}
  .nav a{display:flex;gap:10px;align-items:center;padding:9px 10px;border-radius:8px;color:#C7CEE8;font-weight:500;font-size:14px}
  .nav a:hover{background:#161E40;color:#fff;text-decoration:none}
  .nav a.active{background:var(--blue);color:#fff}
  .nav .icon{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:14px}
  .sidebar-foot{margin-top:auto;font-size:12px;color:#7A82A0;border-top:1px solid #1E2545;padding-top:12px}
  .who{font-weight:600;color:#E2E6F5;font-size:13px}
  .who span{color:#9AA3C7;font-weight:500;display:block}
  .signout{margin-top:8px;background:transparent;border:1px solid #2A325A;color:#C7CEE8;padding:6px 10px;border-radius:8px;font-size:12px;width:100%}
  .signout:hover{background:#161E40}
  .main{padding:28px 32px 60px;max-width:1100px;width:100%}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;gap:12px;flex-wrap:wrap}
  .topbar h1{margin:0}
  .topbar .meta{color:var(--muted);font-size:13px}
  /* cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
  .card+.card{margin-top:14px}
  .grid{display:grid;gap:14px}
  .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
  .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
  @media(max-width:900px){.grid-3,.grid-2{grid-template-columns:1fr}.app{grid-template-columns:1fr}.sidebar{position:static;height:auto}.main{padding:18px}}
  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:600;font-size:14px;cursor:pointer;transition:all .15s}
  .btn:hover{border-color:#C9D0E2;background:#F7F8FB}
  .btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
  .btn-primary:hover{background:#1E48E5;border-color:#1E48E5}
  .btn-ghost{background:transparent;border-color:transparent;color:var(--blue)}
  .btn-danger{background:#fff;color:var(--red);border-color:#FCA5A5}
  .btn-sm{padding:6px 10px;font-size:13px;border-radius:8px}
  .btn-lg{padding:14px 22px;font-size:16px}
  /* inputs */
  .field{margin-bottom:14px}
  .label{display:block;font-weight:600;font-size:13px;color:var(--ink-2);margin-bottom:6px}
  .input,.select,.textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s, box-shadow .15s}
  .input:focus,.select:focus,.textarea:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(42,91,255,.12)}
  .textarea{min-height:110px;resize:vertical;font-family:inherit;line-height:1.55}
  .help{color:var(--muted);font-size:12.5px;margin-top:6px}
  /* pills / badges */
  .badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;background:#EEF2FB;color:var(--ink-2)}
  .badge-ok{background:#DCFCE7;color:#166534}
  .badge-warn{background:#FEF3C7;color:#92400E}
  .badge-bad{background:#FEE2E2;color:#991B1B}
  .badge-blue{background:var(--blue-soft);color:var(--navy-2)}
  .badge-yellow{background:#FEF6CF;color:#7C5800}
  /* progress */
  .progress{height:8px;background:#EEF2FB;border-radius:99px;overflow:hidden}
  .progress>span{display:block;height:100%;background:linear-gradient(90deg,var(--blue),#5C84FF);border-radius:99px}
  /* table */
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top}
  th{background:#F4F6FB;font-weight:600;color:var(--ink-2);font-size:12.5px;text-transform:uppercase;letter-spacing:.04em}
  tr:last-child td{border-bottom:none}
  /* module tile */
  .mtile{display:flex;flex-direction:column;gap:10px;padding:18px;border:1px solid var(--line);border-radius:14px;background:#fff;cursor:pointer;transition:all .15s}
  .mtile:hover{border-color:var(--blue);box-shadow:var(--shadow);transform:translateY(-1px)}
  .mtile .num{font-size:11px;letter-spacing:.1em;color:var(--muted);font-weight:700}
  .mtile .ttl{font-weight:700;font-size:17px;color:var(--ink)}
  .mtile .desc{color:var(--ink-2);font-size:13.5px;line-height:1.5}
  .mtile .foot{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:13px;color:var(--muted)}
  /* lesson */
  .lesson{line-height:1.7}
  .lesson h3{margin-top:22px}
  .lesson h4{margin-top:18px;color:var(--navy-2)}
  .lesson ul,.lesson ol{padding-left:22px;margin:8px 0 14px}
  .lesson li{margin-bottom:6px}
  .lesson blockquote{border-left:3px solid var(--blue);padding:8px 14px;background:var(--blue-soft);border-radius:6px;color:var(--ink);margin:14px 0}
  /* mcq */
  .mcq{padding:14px;border:1px solid var(--line);border-radius:12px;margin-bottom:12px;background:#fff}
  .mcq .q{font-weight:600;margin-bottom:10px}
  .mcq label{display:flex;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;align-items:flex-start;border:1px solid transparent}
  .mcq label:hover{background:#F4F6FB}
  .mcq input[type=radio]{margin-top:3px}
  .mcq.locked label{cursor:default}
  .mcq label.right{background:#DCFCE7;border-color:#86EFAC}
  .mcq label.wrong{background:#FEE2E2;border-color:#FCA5A5}
  .mcq .feedback{margin-top:10px;font-size:13.5px;padding:10px;border-radius:8px;background:var(--blue-soft);color:var(--ink)}
  /* chat */
  .chat{display:flex;flex-direction:column;gap:10px;max-height:520px;overflow-y:auto;padding:14px;background:#F4F6FB;border-radius:12px;border:1px solid var(--line)}
  .msg{padding:10px 14px;border-radius:14px;max-width:85%;white-space:pre-wrap;line-height:1.55;font-size:14.5px}
  .msg-user{background:var(--blue);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
  .msg-ai{background:#fff;border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:4px}
  .msg-sys{background:#FFF7ED;border:1px solid #FED7AA;color:#7C2D12;align-self:center;font-size:12.5px;text-align:center;font-weight:600}
  .typing{display:inline-flex;gap:4px}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:b 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  @keyframes b{0%,80%,100%{opacity:.3}40%{opacity:1}}
  /* score panel */
  .score-card{display:flex;gap:14px;align-items:center;padding:16px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(135deg,#fff,#F7F8FB)}
  .score-num{font-size:36px;font-weight:800;letter-spacing:-.02em;color:var(--navy-2);min-width:90px}
  .score-num small{font-size:14px;color:var(--muted);font-weight:600}
  /* misc */
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .spacer{height:14px}
  .muted{color:var(--muted)}
  .tag{display:inline-block;padding:2px 8px;border-radius:6px;background:#F0F3FA;color:var(--ink-2);font-size:12px;font-weight:600;margin-right:6px}
  .kpi{display:flex;flex-direction:column;gap:4px;padding:14px;border:1px solid var(--line);border-radius:12px;background:#fff}
  .kpi .v{font-size:24px;font-weight:800;color:var(--navy-2)}
  .kpi .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
  .toast{position:fixed;bottom:20px;right:20px;background:#0B1226;color:#fff;padding:12px 18px;border-radius:10px;box-shadow:var(--shadow);z-index:99;font-size:14px;font-weight:500;animation:fadeIn .2s}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .center-full{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#EAF0FF 0%,#FFF 50%,#FEF6CF 100%);padding:24px}
  .login-card{max-width:440px;width:100%;background:#fff;padding:32px;border-radius:18px;box-shadow:0 8px 32px rgba(11,18,38,.08);border:1px solid var(--line)}
  .login-tabs{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:18px}
  .login-tabs button{padding:10px;border:none;background:#F4F6FB;font-weight:600;color:var(--ink-2);cursor:pointer}
  .login-tabs button.on{background:var(--blue);color:#fff}
  .lock{padding:8px 12px;background:#FEF3C7;border:1px solid #FBBF24;border-radius:8px;color:#7C2D12;font-size:13px;margin-bottom:14px}
  details>summary{cursor:pointer;font-weight:600;padding:8px 0}
  .stripe{padding:10px 14px;border-radius:10px;margin:8px 0;font-size:13.5px;border:1px solid}
  .stripe-info{background:var(--blue-soft);border-color:#C7D7FF;color:var(--navy-2)}
  .stripe-warn{background:#FEF3C7;border-color:#FBBF24;color:#7C2D12}
  .stripe-ok{background:#DCFCE7;border-color:#86EFAC;color:#166534}
  .stripe-err{background:#FEE2E2;border-color:#FCA5A5;color:#991B1B}
  .pill{display:inline-block;padding:2px 8px;background:var(--blue-soft);color:var(--navy-2);border-radius:99px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .objection-row{padding:14px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;background:#fff}
  .objection-row .obj{font-weight:600;color:var(--ink);margin-bottom:6px;font-size:14.5px}
  .objection-row .ans{color:var(--ink-2);font-size:13.5px;line-height:1.55}
</style>
</head>

<p>KwikAds is GoKwik's <b>performance-marketing intelligence layer for Meta</b>. It takes the first-party e-commerce data we see across <b>15,000+ merchants and ~170Mn shoppers</b>, enriches it with server-side signals, and pipes it into the brand's Meta ad account as <b>custom events</b> so Meta's algorithm can optimise on signals the pixel alone cannot see.</p>

<p>Roughly <b>40% of Meta ad budget is wasted</b> on most D2C accounts. The leak shows up in five repeating shapes:</p>

<p><i>Each split account is mandated against ONE specific problem statement, not a generic "do better". This makes outcome accountability crystal clear.</i></p>

async function syncToSheet(action, payload){
  const url = STATE.settings.sheetUrl;
  if(!url) return {ok:false, reason:"no_url"};
  try{
    const resp = await fetch(url, {
      method:"POST",
      mode:"cors",
      headers:{"Content-Type":"text/plain"}, // avoid CORS preflight on Apps Script
      body: JSON.stringify({action, payload})
    });
    return await resp.json();
  }catch(e){
    return {ok:false, reason:e.message};
  }
}
async function loadFromSheet(){
  const url = STATE.settings.sheetUrl;
  if(!url) return false;
  try{
    const resp = await fetch(url + "?action=getAll", {method:"GET"});
    const d = await resp.json();
    if(d.ok){
      STATE.reps = d.reps || [];
      STATE.progress = d.progress || {};
      STATE.attempts = d.attempts || [];
      saveLocal();
      return true;
    }
  }catch(e){console.warn("sheet sync fail",e)}
  return false;
}

/* ---------- 5. AI LAYER ---------- */
async function callLLM(messages, systemPrompt){
  const provider = STATE.settings.aiProvider;
  const apiKey = STATE.settings.apiKey;
  if(!apiKey || provider === "scripted"){
    return scriptedFallback(messages, systemPrompt);
  }
  try{
    if(provider === "anthropic"){
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
          "content-type": "application/json"
        },
        body: JSON.stringify({
          model: STATE.settings.aiModel || "claude-sonnet-4-5",
          max_tokens: 1024,
          system: systemPrompt || "",
          messages: messages
        })
      });
      const d = await resp.json();
      if(d.content && d.content[0]) return d.content[0].text;
      return "AI error: " + JSON.stringify(d);
    } else if(provider === "gemini"){
      const model = STATE.settings.aiModel || "gemini-1.5-flash";
      // Gemini API: convert chat messages to its format
      const contents = messages.map(m => ({
        role: m.role === "assistant" ? "model" : "user",
        parts: [{text: m.content}]
      }));
      const body = { contents };
      if(systemPrompt) body.systemInstruction = { parts: [{text: systemPrompt}] };
      const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(apiKey)}`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(body)
      });
      const d = await resp.json();
      if(d.candidates && d.candidates[0] && d.candidates[0].content && d.candidates[0].content.parts){
        return d.candidates[0].content.parts.map(p => p.text || "").join("");
      }
      return "AI error: " + JSON.stringify(d).slice(0, 400);
    } else { // openai
      const resp = await fetch("https://api.openai.com/v1/chat/completions", {
        method:"POST",
        headers:{
          "Authorization": "Bearer " + apiKey,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: STATE.settings.aiModel || "gpt-4o-mini",
          messages: [{role:"system",content:systemPrompt||""}, ...messages]
        })
      });
      const d = await resp.json();
      return (d.choices && d.choices[0] && d.choices[0].message.content) || ("AI error: " + JSON.stringify(d));
    }
  }catch(e){
    return "AI error: " + e.message + ". Falling back to scripted feedback.\n\n" + scriptedFallback(messages, systemPrompt);
  }
}
function scriptedFallback(messages, systemPrompt){
  const text = messages[messages.length-1]?.content || "";
  // Heuristic scoring for open-text & roleplay if no API key
  const len = text.length;
  let score = 60;
  const checks = [
    /audit/i, /36|48/, /view[- ]only/i, /roas/i, /prepaid/i, /3[- ]month|3 month|three[- ]month/i,
    /target/i, /case stud/i, /sankalp|sham|rohan/i, /event|emq/i
  ];
  let hits = 0; checks.forEach(r => { if(r.test(text)) hits++; });
  score = Math.min(95, 50 + hits * 6 + Math.min(len/30, 10));
  return `**Score: ${Math.round(score)}/100**\n\nScripted feedback (no API key configured): you mentioned ${hits} of the ${checks.length} key concepts the rubric looks for. Add an API key in Admin → Settings to get full AI grading and live role-play coaching.\n\n• Mention the audit + 36-48h turnaround if you didn't.\n• Say "view-only" access explicitly.\n• Quote at least one specific KwikAds event (purchase_prepaid, kp_identified, etc.).\n• Reference at least one customer (Bombay Shaving, Sassafras, etc.) where relevant.`;
}

/* ---------- 5b. PACING HELPERS ---------- */
function normalizeDate(d){
  if(!d) return new Date().toISOString().slice(0,10);
  // Already a Date object (Sheets returns Date objects via getValues)
  if(d instanceof Date) return d.toISOString().slice(0,10);
  // ISO string with timezone (e.g. "2026-05-04T18:30:00.000Z")
  const s = String(d);
  if(s.includes("T")) return new Date(s).toISOString().slice(0,10);
  // Already YYYY-MM-DD
  return s.slice(0,10);
}
function getStartDate(rep){
  return normalizeDate(rep && (rep.trainingStartDate || rep.joinDate));
}
function daysSince(dateStr){
  if(!dateStr) return 0;
  const norm = normalizeDate(dateStr);
  const d = new Date(norm+"T00:00:00");
  const now = new Date();
  const ms = now - d;
  return Math.max(0, Math.floor(ms / 86400000));
}
function paceFor(rep){
  const start = getStartDate(rep);
  const elapsed = daysSince(start) + 1; // Day 1 = first day
  const total = CONFIG.TRAINING_DURATION_DAYS;
  const remaining = total - elapsed;
  const p = STATE.progress[rep.email] || {};
  const passed = CURRICULUM.filter(m => p[m.id] && p[m.id].status === "pass").length;
  // Smooth expected curve scaled to total modules (now 6)
  // 3-day grace period; expectation ramps up across the 14-day window
  const totalModules = CURRICULUM.length;
  let expected;
  if(elapsed <= 3) expected = 0;
  else if(elapsed <= 7) expected = Math.ceil(totalModules * 0.25);  // ~25% by end of W1
  else if(elapsed <= 10) expected = Math.ceil(totalModules * 0.5);  // ~50% by day 10
  else if(elapsed <= 13) expected = Math.ceil(totalModules * 0.75); // ~75% by day 13
  else expected = totalModules;
  const onTrack = passed >= expected;
  let status = "ontrack", label = "On track";
  if(passed === CURRICULUM.length) { status = "done"; label = "Certified"; }
  else if(remaining < 0) { status = "late"; label = "Past deadline"; }
  else if(!onTrack && remaining <= 3) { status = "risk"; label = "At risk"; }
  else if(!onTrack) { status = "behind"; label = "Behind"; }
  return { start, elapsed: Math.min(elapsed, total+999), total, remaining, passed, status, label, expected };
}
function pacePill(p){
  const cls = {ontrack:"badge-ok", risk:"badge-warn", behind:"badge-warn", late:"badge-bad", done:"badge-ok"}[p.status] || "badge";
  return `<span class="badge ${cls}">${p.label}</span>`;
}

async function gradeDrill(q,k){

  el.innerHTML = `<div class="msg-ai msg" style="max-width:100%"><span class="typing"><span></span><span></span><span></span></span> Grading...</div>`;

  const out = await callLLM([{role:"user",content:txt}], sys);

function extractScore(t){
  const m = t.match(/Score[:\s]*(\d{1,3})\s*\/\s*100/i);
  return m ? parseInt(m[1]) : null;
}

async function submitAssessment(mid){
  const m = CURRICULUM.find(x=>x.id===mid);
  const a = m.assessment;
  // grade MCQ
  let mcqRight = 0, mcqTotal = a.mcq.length;
  const mcqDetail = [];
  a.mcq.forEach((q,i)=>{
    const sel = document.querySelector(`input[name="mcq-${i}"]:checked`);
    const val = sel ? parseInt(sel.value) : -1;
    const labels = document.querySelectorAll(`.mcq[data-i="${i}"] label`);
    labels.forEach(l => l.classList.remove("right","wrong"));
    if(val === q.a){ mcqRight++; if(labels[val]) labels[val].classList.add("right"); }
    else { if(val>=0 && labels[val]) labels[val].classList.add("wrong"); if(labels[q.a]) labels[q.a].classList.add("right"); }
    mcqDetail.push({q:q.q, picked: val, correct:q.a, why:q.why});
    // also show feedback
    const block = document.querySelector(`.mcq[data-i="${i}"]`);
    if(block && !block.querySelector(".feedback")){
      const f = document.createElement("div"); f.className="feedback"; f.innerHTML = `<b>Why:</b> ${q.why}`;
      block.appendChild(f); block.classList.add("locked");
    }
  });
  // grade open
  let openTotal = 0, openMax = 0;
  const openResults = [];
  if(a.open){
    for(const q of a.open){
      const txt = (document.getElementById(`open-${q.id}`)||{}).value || "";
      if(!txt.trim()){ openResults.push({q:q.q, score:0, fb:"No answer provided."}); openMax += 100; continue; }
      const sys = `You are an expert KwikAds sales coach. Grade this rep's answer against the rubric. Be specific and constructive.\n\nRUBRIC:\n${q.rubric}\n\nFormat your response EXACTLY as:\n**Score: X/100**\n\n**What worked:**\n- bullet\n\n**What to improve:**\n- bullet\n\n**Stronger version:**\n"..."`;
      const fb = await callLLM([{role:"user",content:`QUESTION: ${q.q}\n\nMY ANSWER:\n${txt}`}], sys);
      const sc = extractScore(fb) ?? 60;
      openResults.push({q:q.q, score: sc, fb, answer: txt});
      openTotal += sc; openMax += 100;
    }
  }
  // composite score
  const mcqPart = (mcqRight / mcqTotal) * 100;
  const openPart = openMax ? (openTotal / openMax) * 100 : null;
  const final = openPart !== null ? Math.round(mcqPart * 0.5 + openPart * 0.5) : Math.round(mcqPart);
  const pass = final >= CONFIG.PASS_MARK;
  // persist
  const me = STATE.user.email;
  STATE.progress[me] = STATE.progress[me] || {};
  STATE.progress[me][mid] = STATE.progress[me][mid] || {lessonsRead:[]};
  STATE.progress[me][mid].assessmentScore = final;
  STATE.progress[me][mid].status = pass ? "pass" : "fail";
  STATE.progress[me][mid].lastAttempt = new Date().toISOString();
  saveLocal();
  syncToSheet("upsertProgress",{email:me, moduleId:mid, progress:STATE.progress[me][mid]});
  recordAttempt({moduleId:mid, kind:"assessment", score: final, maxScore:100, transcript: JSON.stringify({mcqDetail, openResults}, null, 2), feedback:`MCQ ${mcqRight}/${mcqTotal} (${Math.round(mcqPart)}%)${openPart!==null?', Open '+Math.round(openPart)+'%':''}`});
  // result panel
  const el = document.getElementById("assess-result");
  el.innerHTML = `
    <div class="score-card">
      <div class="score-num">${final}<small>/100</small></div>
      <div>
        <div><b>${pass ? "✅ Passed" : "❌ Below pass mark — retake when ready"}</b></div>
        <div class="muted">MCQ ${mcqRight}/${mcqTotal} (${Math.round(mcqPart)}%)${openPart!==null?` · Open-ended ${Math.round(openPart)}%`:""}</div>
      </div>
    </div>
    ${openResults.length ? `<div class="spacer"></div><h3>AI feedback on open-ended answers</h3>
      ${openResults.map(r=>`<div class="card" style="margin-top:8px"><b>Q:</b> ${escapeHTML(r.q)}<hr/><div style="white-space:pre-wrap">${escapeHTML(r.fb)}</div></div>`).join("")}` : ""}
    <div class="row" style="margin-top:14px">
      <button class="btn" onclick="navigate('module',{moduleId:'${m.id}'})">Back to module</button>
      ${pass && CURRICULUM.findIndex(x=>x.id===m.id)<CURRICULUM.length-1 ? `<button class="btn btn-primary" onclick="navigate('module',{moduleId:'${CURRICULUM[CURRICULUM.findIndex(x=>x.id===m.id)+1].id}'})">Next module →</button>` : ""}
    </div>`;
  if(el.scrollIntoView) el.scrollIntoView({behavior:"smooth"});
}

const RP_STATE = { history: [], turns: 0 };
async function rpSend(mid){
  const m = CURRICULUM.find(x=>x.id===mid);
  const rp = m.assessment.roleplay;
  const input = document.getElementById("rp-input");
  const txt = input.value.trim();
  if(!txt) return;
  const chat = document.getElementById("rp-chat");
  appendMsg(chat, "user", txt);
  RP_STATE.history.push({role:"user", content: txt});
  input.value = "";
  appendMsg(chat, "ai", null, true);
  const out = await callLLM(RP_STATE.history, rp.systemPrompt);
  removeTyping(chat);
  appendMsg(chat, "ai", out);
  RP_STATE.history.push({role:"assistant", content: out});
  RP_STATE.turns++;
  if(out.includes("[SCENE ENDS]") || RP_STATE.turns >= 8){
    appendMsg(chat, "sys", "Scene complete. Click 'End & grade' for AI feedback.");
  }
}
async function rpEnd(mid){
  const m = CURRICULUM.find(x=>x.id===mid);
  const rp = m.assessment.roleplay;
  if(!RP_STATE.history.length){ toast("Have at least one exchange first"); return; }
  const transcript = RP_STATE.history.map(t => `${t.role==="user"?"REP":"PROSPECT"}: ${t.content}`).join("\n\n");
  const sys = `You are a sales coach for KwikAds, grading a rep's role-play. Score 0-100 against this rubric:\n\n${rp.rubric}\n\nFormat:\n**Score: X/100**\n\n**Strengths:**\n- bullet\n\n**Coaching points (3 specific):**\n1.\n2.\n3.\n\n**Stronger ask line for the audit:**\n"..."`;
  const out = await callLLM([{role:"user", content: "TRANSCRIPT:\n\n"+transcript}], sys);
  const sc = extractScore(out) ?? 60;
  recordAttempt({moduleId:mid, kind:"roleplay", score: sc, maxScore:100, transcript, feedback: out});
  // include in module score: take max of MCQ-based score and roleplay or just keep separately
  const me = STATE.user.email;
  STATE.progress[me] = STATE.progress[me] || {};
  STATE.progress[me][mid] = STATE.progress[me][mid] || {lessonsRead:[]};
  STATE.progress[me][mid].roleplayScore = sc;
  saveLocal();
  syncToSheet("upsertProgress",{email:me, moduleId:mid, progress:STATE.progress[me][mid]});
  document.getElementById("rp-result").innerHTML = `<div class="card" style="margin-top:14px"><div class="score-card"><div class="score-num">${sc}<small>/100</small></div><div><b>Role-play graded</b><div class="muted">${RP_STATE.turns} turns</div></div></div><div style="white-space:pre-wrap;margin-top:12px">${escapeHTML(out)}</div></div>`;
  RP_STATE.history = []; RP_STATE.turns = 0;
}
function appendMsg(chat, who, txt, typing){
  const div = document.createElement("div");
  div.className = "msg " + (who==="user"?"msg-user":who==="sys"?"msg-sys":"msg-ai");
  if(typing){ div.classList.add("typing-msg"); div.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>'; }
  else div.textContent = txt;
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
}
function removeTyping(chat){ const t = chat.querySelector(".typing-msg"); if(t) t.remove(); }

    <div class="topbar"><h1>Playbook quick reference</h1><div class="meta">Searchable cheat sheet — bookmark this.</div></div>
    <div class="card">
      <input class="input" id="pb-search" placeholder="Search 'prepaid', 'EMQ', 'pricing', 'objection'..." oninput="filterPlaybook(this.value)" />
    </div>
    <div id="pb-results">
      ${renderPlaybookSection("One-liner", "KwikAds is a targeting tool that optimises ROAS and reduces CAC by enriching Meta with GoKwik's first-party signals.")}
      ${renderPlaybookSection("Hard numbers", "+25% ROAS · -15% CAC · +22% email match · +28% phone match · 9.3 EMQ on Purchase · 95% Indian shopper ID · 200+ signals · ~15 min setup.")}
      ${renderPlaybookSection("Custom events", "Top: kp_visitors, kp_engaged_visitors. Mid: kp_identified, kp_add_to_cart, kp_initiate_checkout. Bottom: purchase_new_customer, purchase_prepaid, purchase_repeat_customer.")}
      ${renderPlaybookSection("Pricing — SAAS", "Flat ₹60–70K/month, no variable. 2-week trial available. Brand keeps in-house Meta team.")}
      ${renderPlaybookSection("Pricing — Agency", "Fixed retainer + variable tied to ROAS targets. Sized after 36–48h audit. Creative stays with brand.")}
      ${renderPlaybookSection("Routing heuristic", "<₹5L spend = qualify hard. ₹5L–15L + in-house = SAAS. ₹15L+ + stretched team = Agency. Tied to existing agency = split workflow on old/pilot account.")}
      ${renderPlaybookSection("3 discovery questions", "1) Monthly Meta spend — growing? 2) Current ROAS / CAC — break-even? 3) In-house, agency, or mix?")}
      ${renderPlaybookSection("Pain → lever map", "Rising CAC → server-side enrichment + new-customer event. Low prepaid share → purchase_prepaid as goal. High RTO → low-RTO signal. ROAS plateau → enriched events. Ad fatigue → audit + Agency cadence.")}
      ${renderPlaybookSection("Closing line for audit ask", `"I don't want to throw a target on the table I can't back. Give me view-only on your ad account, 48 hours, and I'll come back with a roadmap and a number we can both sign up to."`)}
      ${renderPlaybookSection("Standard CC discipline", "Sankalp + Sham always. Add Rohan for Agency deals. Add Karan where applicable.")}
      ${renderPlaybookSection("Reference customers", "Bombay Shaving Company, Palmonas, Fablestreet, Innovist, Enamor, Honasa, Aubia, Sassafras, Beastlife, Baby Forest, Miss Mosa, Solara, Trylo.")}
      ${renderPlaybookSection("When NOT to pitch", "Mid-DD/acquisition. Custom platform + thin dev. Refuses ad-account access. Spend <₹5L with no scaling plan.")}
    </div>`;
}
function renderPlaybookSection(t,b){
  return `<div class="card pb-row" data-text="${(t+' '+b).toLowerCase().replace(/"/g,'&quot;')}"><h4>${t}</h4><div>${b}</div></div>`;
}
function filterPlaybook(q){
  q = q.toLowerCase().trim();
  document.querySelectorAll(".pb-row").forEach(r => {
    r.style.display = !q || r.dataset.text.includes(q) ? "" : "none";
  });
}

/* ----- LEADERBOARD ----- */
function renderLeaderboard(){
  const rows = STATE.reps.filter(r=>r.role!=="admin").map(r => {
    const p = STATE.progress[r.email] || {};
    let total = 0, count = 0, passed = 0;
    CURRICULUM.forEach(m => {
      const mp = p[m.id];
      if(mp && typeof mp.assessmentScore === "number"){ total += mp.assessmentScore; count++; }
      if(mp && mp.status === "pass") passed++;
    });
    const avg = count ? Math.round(total/count) : 0;
    const certified = passed === CURRICULUM.length;
    return { ...r, avg, passed, certified };
  }).sort((a,b)=> (b.passed - a.passed) || (b.avg - a.avg));
  return `
    <div class="topbar"><h1>Leaderboard</h1><div class="meta">Across ${rows.length} reps · ranked by modules passed, then avg score.</div></div>
    <div class="card">
    <table><thead><tr><th>#</th><th>Rep</th><th>Segment</th><th>Modules passed</th><th>Avg score</th><th>Status</th></tr></thead><tbody>
      ${rows.map((r,i)=>`<tr><td>${i+1}</td><td><b>${r.name}</b><br/><span class="muted">${r.email}</span></td><td>${r.segment||"-"}</td><td>${r.passed}/${CURRICULUM.length}</td><td>${r.avg}</td><td>${r.certified?'<span class="badge badge-ok">🏅 Certified</span>':'<span class="badge">In progress</span>'}</td></tr>`).join("") || `<tr><td colspan="6" style="text-align:center;padding:24px" class="muted">No reps yet. Add some in Admin → Reps.</td></tr>`}
    </tbody></table></div>`;
}

/* ----- ADMIN: REPS ----- */
function renderAdmin(){
  const rows = STATE.reps.filter(r=>r.role!=="admin");
  return `
    <div class="topbar">
      <div><h1>Reps & progress</h1><div class="meta">Add, deactivate, and monitor every rep.</div></div>
      <button class="btn btn-primary" onclick="document.getElementById('add-rep').scrollIntoView({behavior:'smooth'})">+ Add rep</button>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Segment</th><th>Started</th><th>Day</th><th>Modules</th><th>Avg</th><th>Pace</th><th>Status</th><th></th></tr></thead>
        <tbody>
          ${rows.map(r => {
            const p = STATE.progress[r.email] || {};
            let total=0,count=0,passed=0;
            CURRICULUM.forEach(m => {
              const mp = p[m.id];
              if(mp && typeof mp.assessmentScore==="number"){ total+=mp.assessmentScore; count++; }
              if(mp && mp.status==="pass") passed++;
            });
            const pc = paceFor(r);
            return `<tr>
              <td><b>${r.name}</b></td>
              <td>${r.email}</td>
              <td>${r.segment||"-"}</td>
              <td>${getStartDate(r)}</td>
              <td>${pc.elapsed > pc.total ? `<span class="muted">+${pc.elapsed - pc.total}d</span>` : `${pc.elapsed}/${pc.total}`}</td>
              <td>${passed}/${CURRICULUM.length}</td>
              <td>${count?Math.round(total/count):"-"}</td>
              <td>${pacePill(pc)}</td>
              <td>${r.status==="inactive"?'<span class="badge badge-bad">Inactive</span>':'<span class="badge badge-ok">Active</span>'}</td>
              <td><button class="btn btn-sm" onclick="toggleRep('${r.email}')">${r.status==="inactive"?"Activate":"Deactivate"}</button>
                  <button class="btn btn-sm btn-danger" onclick="removeRep('${r.email}')">Remove</button></td>
            </tr>`;
          }).join("") || `<tr><td colspan="10" style="text-align:center;padding:24px" class="muted">No reps yet — add some below.</td></tr>`}
        </tbody>
      </table>
    </div>
    <div class="card" id="add-rep" style="margin-top:14px">
      <h3>Add a new rep</h3>
      <div class="grid grid-2">
        <div class="field"><label class="label">Full name</label><input class="input" id="nr-name" placeholder="Priya Sharma"/></div>
        <div class="field"><label class="label">Work email</label><input class="input" id="nr-email" placeholder="priya@gokwik.co"/></div>
        <div class="field"><label class="label">Segment</label>
          <select class="select" id="nr-seg">
            <option>SMB</option><option>Mid-Market</option><option>Enterprise</option>
          </select></div>
        <div class="field"><label class="label">Role</label>
          <select class="select" id="nr-role">
            <option value="rep">Rep</option><option value="admin">Admin</option>
          </select></div>
        <div class="field"><label class="label">Training start date</label>
          <input class="input" id="nr-start" type="date" value="${new Date().toISOString().slice(0,10)}"/>
          <div class="help">2-week countdown begins from this date.</div></div>
      </div>
      <button class="btn btn-primary" onclick="addRep()">Add rep</button>
    </div>`;
}
function addRep(){
  const name = document.getElementById("nr-name").value.trim();
  const email = (document.getElementById("nr-email").value||"").trim().toLowerCase();
  const seg = document.getElementById("nr-seg").value;
  const role = document.getElementById("nr-role").value;
  const startDate = document.getElementById("nr-start").value || new Date().toISOString().slice(0,10);
  if(!name || !email || !/.+@.+\..+/.test(email)){ toast("Name and valid email required"); return; }
  if(STATE.reps.find(r=>r.email===email)){ toast("Email already exists"); return; }
  const rep = { name, email, segment:seg, role, joinDate: new Date().toISOString().slice(0,10), trainingStartDate: startDate, status:"active" };
  STATE.reps.push(rep);
  saveLocal();
  syncToSheet("upsertRep",{rep});
  toast("Rep added ✓");
  render();
}
function toggleRep(email){
  const r = STATE.reps.find(x=>x.email===email);
  r.status = r.status==="inactive" ? "active" : "inactive";
  saveLocal();
  syncToSheet("upsertRep",{rep:r});
  render();
}
function removeRep(email){
  if(!confirm("Remove this rep? Their progress will also be removed locally (Sheet may keep historical records).")) return;
  STATE.reps = STATE.reps.filter(r => r.email !== email);
  delete STATE.progress[email];
  saveLocal();
  syncToSheet("removeRep",{email});
  render();
}

/* ----- ADMIN: ATTEMPTS ----- */
function renderAttempts(){
  const list = STATE.attempts.slice().sort((a,b)=> (b.timestamp||"").localeCompare(a.timestamp||""));
  return `
    <div class="topbar"><h1>Attempts log</h1><div class="meta">${list.length} graded items</div></div>
    <div class="card">
      <table>
        <thead><tr><th>When</th><th>Rep</th><th>Module</th><th>Kind</th><th>Score</th><th></th></tr></thead>
        <tbody>
          ${list.map((a,i)=>`<tr>
            <td>${a.timestamp ? a.timestamp.slice(0,16).replace("T"," ") : "-"}</td>
            <td>${a.repEmail}</td>
            <td>${a.moduleId}</td>
            <td>${a.kind}</td>
            <td>${a.score!=null?a.score+"/"+a.maxScore:"-"}</td>
            <td><details><summary>View</summary><pre style="white-space:pre-wrap;background:#F4F6FB;padding:10px;border-radius:8px;font-size:12.5px">${escapeHTML(a.feedback||"")}\n\n--- transcript ---\n${escapeHTML(a.transcript||"").slice(0,3000)}</pre></details></td>
          </tr>`).join("") || `<tr><td colspan="6" style="text-align:center;padding:24px" class="muted">No attempts yet.</td></tr>`}
        </tbody>
      </table>
    </div>`;
}

/* ----- ADMIN: SETTINGS ----- */
function renderAdminSettings(){
  const s = STATE.settings;
  return `
    <div class="topbar"><h1>Settings</h1></div>
    <div class="card">
      <h3>AI grading & coaching</h3>
      <div class="field"><label class="label">AI provider</label>
        <select class="select" id="ai-prov">
          <option value="gemini" ${s.aiProvider==="gemini"?"selected":""}>Google Gemini (free tier)</option>
          <option value="anthropic" ${s.aiProvider==="anthropic"?"selected":""}>Anthropic Claude</option>
          <option value="openai" ${s.aiProvider==="openai"?"selected":""}>OpenAI GPT</option>
          <option value="scripted" ${s.aiProvider==="scripted"?"selected":""}>Scripted (no API)</option>
        </select>
      </div>
      <div class="field"><label class="label">Model name</label>
        <input class="input" id="ai-model" value="${s.aiModel||""}" placeholder="gemini-1.5-flash, claude-sonnet-4-5, or gpt-4o-mini" />
        <div class="help">For Gemini: <code>gemini-1.5-flash</code> (free, fast) or <code>gemini-1.5-pro</code> (free with lower limits). For Claude: <code>claude-sonnet-4-5</code>. For OpenAI: <code>gpt-4o-mini</code>.</div>
      </div>
      <div class="field"><label class="label">API key</label>
        <input class="input" id="ai-key" type="password" value="${s.apiKey||""}" placeholder="API key (sk-... or AIza...)" />
        <div class="help">Stored only in your browser's localStorage. Get a free Gemini key at <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a>. Anthropic: <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>. OpenAI: <a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com/api-keys</a>.</div>
      </div>
    </div>
    <div class="card">
      <h3>Apps Script (Google Sheet) backend</h3>
      <div class="field"><label class="label">Web App URL</label>
        <input class="input" id="sheet-url" value="${s.sheetUrl||""}" placeholder="https://script.google.com/macros/s/.../exec" />
        <div class="help">Deploy <code>code.gs</code> as a Web App (anyone with the link can access). See <code>DEPLOYMENT.md</code>.</div>
      </div>
      <button class="btn" onclick="testSheet()">Test connection</button>
      <button class="btn" onclick="pullSheet()">Pull from Sheet</button>
      <div id="sheet-test" style="margin-top:8px"></div>
    </div>
    <div class="card">
      <h3>Admin password</h3>
      <div class="field"><label class="label">Change admin password</label>
        <input class="input" id="adm-pwd" type="password" value="${s.adminPassword}" />
      </div>
    </div>
    <div class="card">
      <h3>Danger zone</h3>
      <button class="btn btn-danger" onclick="resetAll()">Wipe all local data</button>
    </div>
    <div class="card">
      <button class="btn btn-primary btn-lg" onclick="saveSettings()">Save settings</button>
    </div>`;
}
function saveSettings(){
  STATE.settings.aiProvider = document.getElementById("ai-prov").value;
  STATE.settings.aiModel = document.getElementById("ai-model").value.trim() || ({anthropic:"claude-sonnet-4-5", openai:"gpt-4o-mini", gemini:"gemini-1.5-flash"}[STATE.settings.aiProvider] || "gemini-1.5-flash");
  STATE.settings.apiKey = document.getElementById("ai-key").value.trim();
  STATE.settings.sheetUrl = document.getElementById("sheet-url").value.trim();
  STATE.settings.adminPassword = document.getElementById("adm-pwd").value || STATE.settings.adminPassword;
  saveLocal();
  toast("Settings saved ✓");
}
async function testSheet(){
  STATE.settings.sheetUrl = document.getElementById("sheet-url").value.trim();
  saveLocal();
  const el = document.getElementById("sheet-test");
  el.innerHTML = `<div class="stripe stripe-info">Testing...</div>`;
  const r = await syncToSheet("ping",{});
  el.innerHTML = r.ok ? `<div class="stripe stripe-ok">Connected ✓ — ${r.message||"Sheet backend is reachable"}</div>` : `<div class="stripe stripe-err">Failed: ${r.reason||"unknown"}. Check the URL and that the Apps Script is deployed as 'Anyone' or 'Anyone with link'.</div>`;
}
async function pullSheet(){
  const ok = await loadFromSheet();
  toast(ok?"Pulled from Sheet ✓":"Pull failed");
  render();
}
function resetAll(){
  if(!confirm("Wipe ALL local progress, reps, attempts, and settings? Sheet data is unaffected.")) return;
  localStorage.removeItem(LS_KEY);
  location.reload();
}

/* ---------- 8. UTILITIES ---------- */
function recordAttempt(a){
  const att = {
    id: Math.random().toString(36).slice(2,10),
    repEmail: STATE.user.email,
    timestamp: new Date().toISOString(),
    ...a
  };
  STATE.attempts.push(att);
  saveLocal();
  syncToSheet("logAttempt",{attempt:att});
}
function escapeHTML(s){ return (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ---------- 9. INIT ---------- */
loadLocal();
render();
// Try background sync if URL set
if(STATE.user && STATE.settings.sheetUrl){ loadFromSheet().then(()=>render()); }
</script>
</body>
